<title>AIエージェント資格 第2章 業務の基礎 精読ビューア</title>
<style>
:root {
  --bg: #fafafa; --surface: #fff; --surface2: #f3f4f6; --surface3: #e9eaec;
  --text: #1a1a1a; --text2: #444; --text3: #888;
  --accent: #4f46e5; --accent2: #818cf8; --accent-light: #eef2ff;
  --border: #e5e7eb;
  --cat-knowledge: #dbeafe; --cat-knowledge-text: #1d4ed8;
  --cat-scenario: #d1fae5; --cat-scenario-text: #065f46;
  --cat-case: #fef3c7; --cat-case-text: #92400e;
  --cat-column: #f3e8ff; --cat-column-text: #6b21a8;
  --cat-check: #fee2e2; --cat-check-text: #991b1b;
  --status-known-bg: #f0fdf4; --status-unsure-bg: #fff7ed; --status-unknown-bg: #fef2f2;
  --point-bg: #fffbeb; --point-border: #f59e0b; --point-text: #78350f;
  --sub-bg: #f8fafc; --sub-border: #cbd5e1; --sub-title: #1e40af;
  --concept-color: #4338ca;
  --font-size: 15px;
  --line-height: 1.85;
}
.dark {
  --bg: #111827; --surface: #1f2937; --surface2: #374151; --surface3: #4b5563;
  --text: #f9fafb; --text2: #d1d5db; --text3: #9ca3af;
  --border: #374151; --accent-light: #1e1b4b;
  --cat-knowledge: #1e3a5f; --cat-knowledge-text: #93c5fd;
  --cat-scenario: #064e3b; --cat-scenario-text: #6ee7b7;
  --cat-case: #451a03; --cat-case-text: #fcd34d;
  --cat-column: #3b0764; --cat-column-text: #d8b4fe;
  --cat-check: #450a0a; --cat-check-text: #fca5a5;
  --status-known-bg: #052e16; --status-unsure-bg: #1c1917; --status-unknown-bg: #1a0000;
  --point-bg: #422006; --point-border: #d97706; --point-text: #fde68a;
  --sub-bg: #1e293b; --sub-border: #475569; --sub-title: #93c5fd;
  --concept-color: #a5b4fc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-size: var(--font-size); line-height: var(--line-height);
  font-family: 'Hiragino Kochi Pro','HiraKakuProN-W3','Noto Sans JP',sans-serif;
}

/* ── ヘッダー ── */
#header {
  position: sticky; top: 0; z-index: 100; background: var(--accent); color: #fff;
  display: flex; align-items: center; padding: 0 10px; height: 50px; gap: 8px;
}
#header h1 { flex: 1; font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#header button { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 5px; min-width: 34px; }

/* ── サイドドロワー TOC ── */
#overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; }
#overlay.open { display: block; }
#drawer {
  position: fixed; left: -300px; top: 0; bottom: 0; width: 280px;
  background: var(--surface); z-index: 201; overflow-y: auto;
  transition: left .22s ease; box-shadow: 2px 0 16px rgba(0,0,0,.25);
}
#drawer.open { left: 0; }
#drawer-header { background: var(--accent); color: #fff; padding: 14px 16px; font-weight: 700; font-size: 14px; }
.toc-sec { border-bottom: 1px solid var(--border); }
.toc-sec-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 11px 14px; background: none; border: none;
  color: var(--text); font-size: 13px; font-weight: 700; cursor: pointer; text-align: left;
}
.toc-sec-btn:hover { background: var(--surface2); }
.toc-st-list { display: none; padding: 4px 0 8px; }
.toc-st-list.open { display: block; }
.toc-st-btn {
  display: block; width: 100%; padding: 7px 14px 7px 26px;
  background: none; border: none; color: var(--text2); font-size: 12px; cursor: pointer; text-align: left;
}
.toc-st-btn:hover { background: var(--surface2); color: var(--accent); }

/* ── ツールバー ── */
#toolbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 8px 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.chip {
  padding: 4px 11px; border-radius: 999px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2); font-size: 12px; cursor: pointer; white-space: nowrap;
}
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
#font-slider { width: 80px; accent-color: var(--accent); }

/* ── 検索バー ── */
#search-bar { display: none; background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 12px; }
#search-input {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--surface2); color: var(--text); font-size: 14px;
}
#search-input:focus { outline: 2px solid var(--accent); }

/* ── パンくず ── */
#breadcrumb {
  background: var(--surface2); padding: 5px 12px; font-size: 11px;
  color: var(--text3); border-bottom: 1px solid var(--border); min-height: 26px;
}

/* ── メインコンテンツ ── */
#main { padding: 0 0 80px; }
.section-block { margin: 0; }
.section-header { background: var(--accent); color: #fff; padding: 16px 14px 12px; }
.section-header h2 { font-size: 16px; font-weight: 800; }
.section-header .sec-meta { font-size: 11px; opacity: .75; margin-top: 4px; }

/* 学習のポイント */
.exam-focus-card {
  background: var(--accent-light); border: 1px solid var(--accent2);
  border-radius: 8px; padding: 12px 14px; margin: 12px 14px 4px;
}
.exam-focus-card .ef-label {
  font-size: 11px; font-weight: 700; color: var(--accent);
  display: block; margin-bottom: 6px; letter-spacing: .05em;
}
.exam-focus-card p { font-size: 13px; color: var(--text2); line-height: 1.75; }

/* ブロックグループ */
.block-group { margin: 0; }
.block-header {
  padding: 7px 14px; font-size: 12px; font-weight: 700;
  border-bottom: 1px solid var(--border); border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}
.block-header::before { content: ''; display: inline-block; width: 4px; height: 14px; border-radius: 2px; background: currentColor; opacity: .6; }
.cat-知識 { background: var(--cat-knowledge); color: var(--cat-knowledge-text); }
.cat-業務シナリオ { background: var(--cat-scenario); color: var(--cat-scenario-text); }
.cat-実践事例 { background: var(--cat-case); color: var(--cat-case-text); }
.cat-コラム { background: var(--cat-column); color: var(--cat-column-text); }
.cat-理解度チェック { background: var(--cat-check); color: var(--cat-check-text); }

/* ─── サブトピックカード ─── */
.subtopic-card { border-bottom: 1px solid var(--border); background: var(--surface); transition: background .15s; }
.subtopic-card.hidden { display: none; }
.subtopic-card.status-known { background: var(--status-known-bg); }
.subtopic-card.status-unsure { background: var(--status-unsure-bg); }
.subtopic-card.status-unknown { background: var(--status-unknown-bg); }

.st-header { display: flex; align-items: flex-start; gap: 8px; padding: 12px 14px 8px; cursor: pointer; user-select: none; }
.st-heading { flex: 1; font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.4; }
.st-page { font-size: 11px; color: var(--text3); white-space: nowrap; margin-top: 3px; }
.st-toggle { font-size: 14px; color: var(--text3); margin-top: 2px; }

.st-body { padding: 2px 14px 10px; display: none; }
.st-body.open { display: block; }

/* ─── 本文要素スタイル ─── */

/* 通常段落 */
.body-para {
  color: var(--text2); font-size: 14px; margin-bottom: 12px;
  line-height: var(--line-height); word-break: break-word;
}
.body-para:last-child { margin-bottom: 0; }

/* POINT ボックス */
.point-box {
  background: var(--point-bg); border-left: 3px solid var(--point-border);
  border-radius: 0 6px 6px 0; padding: 10px 12px; margin: 12px 0;
}
.point-label {
  font-size: 11px; font-weight: 800; color: var(--point-border);
  display: block; margin-bottom: 6px; letter-spacing: .05em;
}
.point-box .point-body { color: var(--point-text); font-size: 13px; line-height: 1.75; }

/* サブブロック（・テキスト生成AI、強化学習、判断N 等） */
.sub-block {
  border: 1px solid var(--sub-border); border-left: 3px solid var(--sub-title);
  border-radius: 0 8px 8px 0; padding: 10px 12px; margin: 8px 0;
  background: var(--sub-bg);
}
.sub-block + .sub-block { margin-top: 6px; }
.sub-block-title {
  font-size: 14px; font-weight: 700; color: var(--sub-title);
  margin-bottom: 6px; line-height: 1.4; padding-bottom: 5px;
  border-bottom: 1px solid var(--sub-border);
}
.sub-block-body { color: var(--text2); font-size: 13px; line-height: 1.75; }

/* 小見出し行（判断N 等のインライン見出し：本文より大きく、sub-blockより軽い） */
.subhead {
  font-size: 15px; font-weight: 700; color: var(--sub-title);
  margin: 16px 0 6px; padding: 6px 10px;
  background: var(--sub-bg); border-left: 3px solid var(--sub-border);
  border-radius: 0 4px 4px 0;
}
.concept-name {
  font-size: 13px; font-weight: 700; color: var(--concept-color);
  margin: 8px 0 3px;
}

/* 理解度チェック quizカード */
.quiz-card { border: 1px solid var(--sub-border); border-radius: 8px; margin: 10px 0; overflow: hidden; }
.quiz-question { background: var(--sub-bg); padding: 10px 12px; font-size: 13px; color: var(--text); line-height: 1.7; }
.quiz-question::before { content: "問 "; font-weight: 700; color: var(--sub-title); }
.quiz-choices { padding: 8px 12px; }
.quiz-choice { display: flex; gap: 8px; padding: 5px 0; font-size: 13px; color: var(--text2); border-bottom: 1px solid var(--border); }
.quiz-choice:last-child { border-bottom: none; }
.quiz-choice-label { font-weight: 700; color: var(--sub-title); min-width: 18px; flex-shrink: 0; }
.quiz-answer-wrap { padding: 8px 12px; background: var(--surface2); }
.quiz-reveal-btn {
  font-size: 12px; padding: 4px 12px; border-radius: 999px;
  border: 1px solid var(--sub-border); background: var(--sub-bg);
  color: var(--sub-title); cursor: pointer; font-weight: 700;
}
.quiz-answer { display: none; margin-top: 8px; font-size: 13px; line-height: 1.7; }
.quiz-answer.open { display: block; }
.quiz-answer-label { font-weight: 700; color: #16a34a; margin-bottom: 4px; }
.quiz-explanation { color: var(--text2); }

/* インラインテーブル（図解再現用） */
.inline-table-wrap { overflow-x: auto; margin: 10px 0; }
.inline-table {
  border-collapse: collapse; width: 100%; font-size: 13px;
  border: 1px solid var(--sub-border); border-radius: 6px; overflow: hidden;
}
.inline-table thead { background: var(--sub-title); }
.inline-table thead th {
  color: #fff; font-weight: 700; padding: 7px 10px;
  text-align: center; border-right: 1px solid rgba(255,255,255,.3);
}
.inline-table thead th:last-child { border-right: none; }
.inline-table tbody td {
  padding: 8px 10px; text-align: center; color: var(--text);
  border-right: 1px solid var(--sub-border); border-top: 1px solid var(--sub-border);
}
.inline-table tbody td:last-child { border-right: none; }

/* ─── アクションボタン ─── */
.st-actions { display: flex; gap: 6px; padding: 4px 14px 10px; flex-wrap: wrap; }
.status-btn {
  padding: 4px 11px; border-radius: 999px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2); font-size: 12px; cursor: pointer;
}
.status-btn.active-known  { background: #16a34a; color: #fff; border-color: #16a34a; font-weight: 700; }
.status-btn.active-unsure { background: #d97706; color: #fff; border-color: #d97706; font-weight: 700; }
.status-btn.active-unknown{ background: #dc2626; color: #fff; border-color: #dc2626; font-weight: 700; }
.bm-btn-st {
  padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text3); font-size: 12px; cursor: pointer;
}
.bm-btn-st.active { color: #f59e0b; border-color: #f59e0b; background: #fffbeb; }

/* メモ */
.st-memo {
  display: none; width: calc(100% - 28px); margin: 0 14px 10px;
  padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface2); color: var(--text); font-size: 13px;
  resize: vertical; min-height: 55px; font-family: inherit; line-height: 1.6;
}
.st-memo.open { display: block; }

/* 図解 */
.st-figures { margin: 10px 0 4px; }
.st-figures figure { margin: 0 0 10px; text-align: center; }
.st-figures figure img {
  max-width: 100%; border-radius: 8px; cursor: zoom-in;
  border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,.1);
}

/* ── 画像モーダル ── */
#img-modal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.88);
  z-index: 500; align-items: center; justify-content: center;
}
#img-modal.open { display: flex; }
#img-modal img { max-width: 96vw; max-height: 92vh; border-radius: 6px; touch-action: pinch-zoom; }
#img-modal-close {
  position: absolute; top: 10px; right: 14px; color: #fff;
  font-size: 30px; cursor: pointer; background: none; border: none; line-height: 1;
}

/* ── ブックマーク一覧 ── */
#bm-view { display: none; padding: 16px 14px 80px; }
#bm-view h2 { font-size: 16px; font-weight: 800; margin-bottom: 12px; }
.bm-item {
  border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; margin-bottom: 10px; cursor: pointer; background: var(--surface);
}
.bm-item:hover { border-color: var(--accent); }
.bm-item-heading { font-size: 14px; font-weight: 700; }
.bm-item-meta { font-size: 12px; color: var(--text3); margin-top: 3px; }
.bm-item-memo { font-size: 12px; color: var(--text2); margin-top: 5px; font-style: italic; }
.bm-empty { color: var(--text3); font-size: 14px; text-align: center; padding: 40px; }
</style>
</head>

<script id="content" type="application/json">{"ch": 2, "title": "業務の基礎", "sections": [{"s": 1, "title": "業務の構造的理解", "exam_focus": "本Sectionでは、AIエージェント導入の出発点として、現状業務を正しく把握することの重要性を\n学びます。試験では、As-Is分析とTo-Be分析の定義、役割、順序の違いが問われます。特に、まず\nAs-Isで現状を整理し、そのうえでTo-Beを設計し、両者の差分を分析するという流れを理解してお\nくことが重要です。あわせて、As-Is分析の段階で改善案を混ぜてしまうという典型的な失敗にも注\n意が必要です。", "page_start": 95, "blocks": [{"category": "知識", "subtopics": [{"heading": "なぜ「現状把握」がAIエージェント導入の最初の仕事なのか", "page": 95, "_heading_y": 376.7480163574219, "figures": [], "elements": [{"type": "para", "text": "「AIエージェントで業務を自動化したい」という相談を受けたとき、多くの推進者は、まず「どのAIツールを使うか」を 考えがちです。しかし、適切な出発点は、現在の業務がどのような流れで成り立ち、どこで人が何をしているかを整理す ることです。現状を正確に把握しないまま理想像だけを描くと、現場の実態に合わない設計になりやすくなります。"}, {"type": "para", "text": "その結果、利用されない仕組みができたり、本来は不要な工程まで自動化対象に含めてしまったりするおそれがありま す。したがって、AIエージェント導入は、ツール選定から始まるのではなく、業務構造の理解から始まると考える必要が あります。では、そもそも「業務」とは何でしょうか。"}, {"type": "para", "text": "この問いを整理することが、AIエージェント導入設計の精度を左右します。"}]}, {"heading": "「業務」を構造的に理解する 仕事‧業務‧作業の違い", "page": 95, "_heading_y": 560.748046875, "figures": [], "elements": [{"type": "para", "text": "日常の会話では混用されがちですが、「仕事」「業務」「作業」は本来、異なる階層を指す言葉です。"}, {"type": "para", "text": "仕事 とは、組織や個人が果たすべき目的や役割の全体です。 たとえば、「顧客の課題を解決する」「売上を伸ばす」 「安全なサービスを提供する」といった、意味や目的の水準がこれに当たります。"}, {"type": "para", "text": "業務 とは、その仕事を実現するために、組織が繰り返し行う一連の流れです。 たとえば、「受注処理」「経費精算」 「問い合わせ対応」のように、一定の手順や担当者、ルールを持つまとまりがこれに当たります。"}, {"type": "para", "text": "作業 とは、業務を構成する具体的な行為です。 たとえば、「Excelに数値を入力する」「領収書を確認する」「問い合わ せ内容を分類する」といった、個別の実行単位がこれに当たります。"}, {"type": "point", "text": ""}, {"type": "para", "text": "この区別が重要なのは、AIエージェント導入では、最初に業務全体の流れを理解し、その中からAI エージェントに任せる作業を特定する必要があるためです。つまり、AIエージェントが直接置き換え る対象は作業であっても、作業だけを単独で見ても、前後の流れや業務上の意味が分からなけれ ば、適切な設計はできません。したがって、「どの作業をAIエージェントに任せるか」を判断する前 提として、「その作業がどの業務の中にあり、どの役割を果たしているか」を把握する必要があり ます。"}]}, {"heading": "業務をIPOで整理し、その中の作業を特定する", "page": 96, "_heading_y": 283.7480163574219, "figures": ["data:image/jpeg;base64,/9j/7gAOQWRvYmUAZAAAAAAB/9sAxQAMCAgICAgMCAgMEAsLCwwPDg0NDhQSDg4TExIXFBIUFBobFxQUG "text": "ここで重要なのは、IPOは業務全体を把握するための見方であり、AIエージェント導入の対象として 最終的に特定するのは、その中に含まれる作業だという点です。つまり、業務をIPOで整理する目的 は、「AIエージェントがこの業務全体を置き換えるか」を考えることではなく、どの入力を受け、 どの処理の中に、AIエージェントが担える作業があるかを見つけることにあります。"}, {"type": "para", "text": "たとえば、経費精算業務では、Inputは「領収書」、Processは「内容の確認、費目分類、金額入力、承認依頼」、 Outputは「会計システムへ渡す登録データ」です。"}, {"type": "para", "text": "このとき、AIエージェント導入の検討対象になるのは、Processに含まれる個々の作業です。たとえば、領収書の内容を 読み取る、費目を分類する、入力候補を作る、といった作業はAIエージェントに任せられる可能性があります。一方、最 終承認のように責任判断を伴う部分は、人が担う設計が適切な場合があります。"}, {"type": "point", "text": ""}, {"type": "para", "text": "また、IPOの視点は、どこで品質が落ちているかを見つけるうえでも有効です。たとえば、Inputの 時点で画像が不鮮明であれば、その後のAI処理の精度は上がりにくくなります。この場合、問題はAI の性能だけでなく、入力情報の質にもあります。したがって、AIエージェント導入では、業務をIPO で整理して全体の流れを理解し、そのうえでProcessの中にある作業を特定し、どこにAIエージェン トを適用するかを判断するという順序で考えることが重要です。"}]}, {"heading": "As-Is分析 業務の「今の姿」を事実だけで記録する", "page": 97, "_heading_y": 545.2525634765625, "figures": [], "elements": [{"type": "para", "text": "As-Is分析とは、業務の「現在の姿」をIPOの構造に沿って正確に記録する分析手法です。「今、誰が、何を、どのよう に、どんな順序で行っているか」をありのままに可視化します。"}, {"type": "point", "text": ""}, {"type": "para", "text": "ここで注意すべきなのが、現状分析の中に改善案を混ぜてしまうことです。たとえば、「経理担当 がExcelに手入力している」という現状記述に対して、同時に「AIエージェントで自動化すべき」と 書いてしまうと、事実の把握と改善の議論が混在します。その結果、現在の業務が実際にはどのよ うに行われているのかを正確に捉えにくくなります。したがって、As-Isを整理する段階では、評価 や改善案を加えず、まずは事実をそのまま記録することが重要です。"}]}, {"heading": "【As-Is分析の具体的な手法】", "page": 98, "_heading_y": 264.7480163574219, "figures": ["data:image/jpeg;base64,/9j/7gAOQWRvYmUAZAAAAAAB/9sAxQAMCAgICAgMCAgMEAsLCwwPDg0NDhQSDg4TExIXFBIUFBobFxQUGx4eJxsUJCcnJyckMjU1NTI7Ozs7Ozs7Ozs7AQ0KCgwKDA4MDA4RDg4MDREUFA8PERQQERgREBQUExQVFRQTFBUVFRUVFRUaGhoaGhoeHh4eHiMjIyMnJycsLCwCDQoKDAoMDgwMDhEODgwNERQUDw8RFBARGBEQFBQTFBUVFBMUFRUVFRUVFRoaGhoaGh4eHh4eIyMjIycnJywsLP/dAAQAG//AABEIAOkBqgMAIgABEQECEQL/xAGiAAEAAgIDAAMBAAAAAAAAAAAEAAcDBQECBggJCgsBAAIDAAEFAQAAAAAAAAAAAAABAgMEBQYHCAkKCxAAAQIEAgEFCREKbwAAAAAAAQIDAAQFERIhMQYTIjSzFTI1QVFhdJGxBxQWIzNUVXFyc4GDhJOhstE2UmJkkpTS0+HwCAkKFxgZGiQlJicoKSo3ODk6QkNERUZHSElKU1ZXWFlaY2VmZ2hpanV2d3h5eoKFhoeIiYqVlpeYmZqio6Slpqeoqaq0tba3uLm6wcL EgQvKzGpKdcr6Ku283gROpmMKgcRSQ2lQytbJHYmM0jqdnGKyahMpZW24HEuWUVKKVggJIKEg6c+LHpIkCF55/UyF06fkktNYppZwqbUWcSSvXBjAQQCkbEEXyHCg0vqWnhS1Sb5ZSszRfIQVBCgW1N4RYJI37h3HGj1USBC1mpymPUiltyUxhLiVKKiglSSTw8wIXUOB8zyO73UwiD1HKnzR8F3e6mG2kVhBoXaT2ox1y33URmjDJ7UY65b7qIzQGk1oX//VtOJEiQIUiRIkCFIkSJAhcxI4iQIXMSJHECFzEjiJAhcxIkcQIXMSOIkCFzEjiJAhcxI4iQIXMSJHECFzEjiOYEKRI4iQIXMSJHECFzEjiJAhcxI4jmBCkSOI5gQpEjiOYEKRIkSBCkSOI5gQsDkjKuSy5TWwlpzEVJRsNko4ioWtZWLO/FjCJOoJ2KZ9ZA0YmmlK7E2F+VDYkMOI0awDlSghc9Kj0/PbTXeROelS6fntlqGxIdmdDerdoiFezKFz0qPT89tNd5E56VHp+e2mu8hsSCzOhvVu0RCvZlC56VHp+e2mu8ic9Kl0/PbLXeQ2JBZnQ3q3aIhXsyhc9Kj0/PbTXeROelR6fntprvIbEgszob1btEQr2ZQuelR6fq7aa7yOq6dMPpLU5OLdZVv7aUNtBY79JAvY8MC14fEgszob1G0RAbZKmjIRIkSIpr//2Q=="], "elements": [{"type": "para", "text": "1 プロセスウォークスルー(現場観察)担当者の作業を実際に横で観察し、画面共有や動画で記録します。ヒアリングだけに頼らないこと が重要です。長年同じ業務を担ってきた担当者は、慣れすぎて自分でも意識していない手順がありま す。「言葉で説明できない暗黙の作業」こそが、ウォークスルーでしか拾えない最も価値ある情報で す。"}, {"type": "para", "text": "2 5W1Hヒアリングシート担当者へのヒアリングを構造化するために、以下の問いを軸に情報を収集します。"}, {"type": "para", "text": "Who(誰が):この作業の担当者は誰か。属人化していないか。"}, {"type": "para", "text": "What(何を):どんな情報‧素材を扱っているか。"}, {"type": "para", "text": "When(いつ):どのタイミングで発生するか。頻度はどのくらいか。"}, {"type": "para", "text": "Where(どこで):どのシステム‧ツール‧場所で行われているか。"}, {"type": "para", "text": "Why(なぜ):この作業はなぜ存在するのか。誰のための何のための工程か。"}, {"type": "para", "text": "How(どのように):具体的な手順はどうなっているか。"}, {"type": "point", "text": ""}, {"type": "para", "text": "特に「Why」の問いは重要です。「なぜこの手順があるのか」を担当者が答えられない場合、それ は「かつて必要だったが今は意味を失った作業」である可能性が高く、AI化より前に廃止を検討す べき候補になります。"}, {"type": "para", "text": "3 スイムレーン図の作成複数の担当者・部署をまたぐ業務フローは、スイムレーン図で可視化します。スイムレーン図とは、横軸に時間の流れ、 縦軸に担当者・部署を配置し、作業の流れと引き渡しのタイミングを図示するものです。これにより「誰から誰に、何が 渡っているか」「どこで待ち時間が発生しているか」「引き渡しの際に情報が欠落していないか」が一目で把握できま す。"}, {"type": "para", "text": "4 マニュアルと実態の差分確認業務マニュアルをそのままAs-Isとして採用するのは危険です。マニュアルと実際の運用が乖離しているケースは珍しく ありません。「マニュアルにはこう書いてあるが、実際にはこうやっている」という差分こそが最も価値ある発見です。 この差分には、現場が長年かけて積み上げた暗黙知が凝縮されており、AI設計に引き継ぐべき業務ルールの核心になりま す。"}, {"type": "para", "text": "5 時間計測(タイムスタディ)各作業にどれだけの時間がかかっているかを実測します。担当者の「体感」ではなく、実際の所要時間を計測すること で、AI化による効果試算の根拠が生まれます。また、時間のかかっている工程が必ずしも「価値の高い工程」とは限りま せん。時間がかかっているのに価値が低い工程こそ、AI化の優先候補です。"}]}, {"heading": "To-Be分析 AI前提で業務プロセスを再設計する", "page": 100, "_heading_y": 339.04669189453125, "figures": [], "elements": [{"type": "para", "text": "To-Be分析とは、業務の「あるべき姿」を設計する手法です。AIエージェント導入後にどのような業務フローになるべき かを、IPOの構造に沿って描きます。"}, {"type": "para", "text": "To-Beを設計する際に最も重要な原則は、「既存業務をそのままAIエージェントに置き換えない」ことです。紙の回覧フ ローをそのままデジタル化しても、本質的な改善にはなりません。"}, {"type": "para", "text": "AIエージェントの導入は業務の「作業」を代替するだけでなく、「そもそもこのProcessは必要か」「このInputの形式 自体を変えられないか」という問いを立てる機会です。AIエージェントを前提に業務プロセスそのものを再設計すること で、初めて本質的な変革が起きます。"}]}, {"heading": "【To-Be分析の具体的な手法】", "page": 100, "_heading_y": 523.0467529296875, "figures": [], "elements": [{"type": "para", "text": "1 ECRSによるプロセスの取捨選択To-Beを設計する前に、As-Isの各プロセスをECRSの四つの観点で評価します。"}, {"type": "para", "text": "Eliminate(排除):この工程は本当に必要か。なくせないか。"}, {"type": "para", "text": "Combine(統合):複数の工程を一つにまとめられないか。"}, {"type": "para", "text": "Rearrange(順序変更):工程の順序を変えることで効率化できないか。"}, {"type": "para", "text": "Simplify(簡素化):工程を残すとして、もっとシンプルにできないか。"}, {"type": "para", "text": "ECRSを先に適用することで、「不要な工程をAIエージェントで自動化する」という最も避けるべき失敗を防げます。AI エージェントに渡す前に削ぎ落とせるものを削ぎ落とすことが、設計の質を決めます。"}, {"type": "para", "text": "2 AIエージェントの役割とHuman-in-the-Loopの設計To-Beにおいては、各プロセスを「AIエージェントが担う作業」と「人間が担う作業」に明確に分類します。この際の判 断基準は三つです。ルールが明確で繰り返し発生するものはAIエージェントへ。判断に例外が多く文脈依存性が高いもの は人間へ。"}, {"type": "para", "text": "AIエージェントの判断に誤りがあった場合のリスクが高いものはHuman-in-the-Loopで人間が最終確認する設計にしま す。"}, {"type": "para", "text": "どこで人間がチェックポイントを持つかを設計に明示することで、責任の所在が明確になり、現場の不安も軽減されま す。"}, {"type": "para", "text": "3 To-Beのストーリーボード設計した理想的な作業の流れを、担当者が実際に使う場面を想像しながら「ストーリーボード」形式で描きます。「月 曜の朝、Aさんはスマートフォンで領収書を撮影する。AIエージェントが自動で経費カテゴリを判定し、申請書を生成す る。Aさんは内容を確認して送信ボタンを押す」のように、使う人の視点で具体的な場面を書き出します。"}, {"type": "para", "text": "これにより、図だけでは見えなかった「操作の手間」「確認のタイミング」「エラー時の対応」といった実装上の課題 が事前に発見できます。"}, {"type": "para", "text": "4 KPIとのひも付けTo-Beの各プロセスについては、その変更が最終的にどの業務指標(KPI)へ影響するかを整理する 必要があります。たとえば、「AIエージェントによる領収書の自動読取」は、「経理担当者の入力時 間を週○時間削減する」という効果を通じて、「顧客対応コストの削減」といった上位目標に結び 付きます。このように、作業レベルの改善と業務指標(KPI)・経営目標とのつながりを明確にする ことが、To-Be設計の根拠になります。"}, {"type": "para", "text": "As-Is → To-Be→ ギャップ分析の順序"}, {"type": "para", "text": "最後に重要な原則は、「As-Is → To-Be→ ギャップ分析」という順序の厳守です。"}, {"type": "para", "text": "ギャップ分析とは、As-IsとTo-Beの差分を明確にし、「何を変えれば理想に到達できるか」を特定するプロセスです。 As-Isで「経理担当がExcelに手入力している」、To-Beで「AIエージェントが領収書画像から自動入力する」とすれば、 ギャップは「領収書の読み取りと入力の自動化」です。このギャップがAIエージェント導入の具体的な要件になります。"}, {"type": "point", "text": ""}, {"type": "para", "text": "To-Beを先に描いてしまうと、現実離れした理想像になり、導入が失敗するリスクが高まります。AI プロジェクトでは特に「技術に感動して理想から入ってしまう」ケースが多いため、意識的にこの 順序を守ることが求められます。"}, {"type": "point", "text": ""}, {"type": "para", "text": "具体的には、業務とは何か、その業務がどのような作業で構成されているか、入力される情報は何 か、処理の結果として何が出力されるかを整理する必要があります。このように現状業務の構造を 把握したうえでAIエージェントの適用範囲を検討することが、単にAIエージェントを導入することで はなく、業務そのものを改善することにつながります。"}]}]}, {"category": "業務シナリオ", "subtopics": [{"heading": "業務シナリオ：ヘルプデスク業務のAs-Is/To-Be分析", "page": 103, "_heading_y": 64.69602966308594, "figures": [], "elements": [{"type": "para", "text": "ヘルプデスクAIの基本設計が固まったため、次に、導入に向けた業務分析を行います。ここで行うのは、現状業務を事実 ベースで整理し、そのうえでAIエージェント導入後のあるべき業務フローを設計し、最後に両者の差分を明らかにするこ とです。この順序で整理することで、どこに課題があり、何を変える必要があるのかを具体的に示しやすくなります。"}, {"type": "subhead", "text": "判断1"}, {"type": "subhead", "text": "As-Is分析 ― 現状業務を正確に記録する"}, {"type": "point", "text": ""}, {"type": "para", "text": "最初に、ヘルプデスク業務の現状を、改善案を加えずに事実だけで整理します。 ここで重要なの は、「こうすべき」といった評価を入れず、現在どのような手順で業務が行われているかをそのまま 記録することです。"}, {"type": "para", "text": "工程1：社員が問い合わせメールを送信する"}, {"type": "para", "text": "工程2：担当者がメールを確認し、問い合わせ内容のカテゴリを判断する"}, {"type": "para", "text": "工程3：担当者がFAQフォルダ内のExcelファイルを検索し、該当する回答を探す"}, {"type": "para", "text": "工程4：FAQに該当する場合は、担当者が回答を手入力してメールで返信する(平均15分)"}, {"type": "para", "text": "工程5：FAQに該当しない場合は、担当者が個別に調査し、回答を作成して返信する(平均45分)"}, {"type": "para", "text": "工程6：担当者が対応内容をExcelの対応記録に手入力する"}, {"type": "para", "text": "工程7：月末に管理者が対応記録を集計し、月次レポートを手作業で作成する"}, {"type": "para", "text": "この段階の目的は、改善案を考えることではなく、現状の業務手順と工数の実態を把握することにあります。"}, {"type": "subhead", "text": "判断2"}, {"type": "subhead", "text": "To-Be設計 ― AIエージェント導入後の業務フローを設計する"}, {"type": "para", "text": "次に、AIエージェント導入後のあるべき業務フローを設計します。 ここでは、現状業務をそのまま置き換えるのではな く、AIエージェントと人間の役割分担を踏まえて、より適切な流れを設計します。"}, {"type": "para", "text": "工程1：問い合わせメールの受信を自動で検知する"}, {"type": "para", "text": "工程2：AIエージェントが問い合わせ内容を自動で分類し、FAQで対応可能かどうかを判定する"}, {"type": "para", "text": "工程3：FAQに該当する場合は、AIエージェントがナレッジベースを検索し、回答文を作成して送信する"}, {"type": "para", "text": "工程4：FAQに該当しない場合は、AIエージェントが担当者へ引き継ぎ、問い合わせの要約と推奨対応案を提示する"}, {"type": "para", "text": "工程5：対応内容を問い合わせ管理の仕組みに自動で記録する"}, {"type": "para", "text": "工程6：月次レポートに必要なデータを管理システムから自動で集計する"}, {"type": "para", "text": "このように、現状の7工程は、AIエージェントと自動化を前提とした6工程へ再設計できます。その結果、担当者の手作業 は減少しますが、引継ぎの判断や回答内容の最終確認など、人間が担うべき部分は意図的に残しています。"}, {"type": "para", "text": "AIエージェント導入の目的は、すべてを無条件に自動化することではなく、人間とAIエージェントがそれぞれ適した役割 を担えるように業務を再設計することにあります。"}, {"type": "subhead", "text": "判断3"}, {"type": "subhead", "text": "ギャップ分析 ― 現状とあるべき姿の差分を整理する"}, {"type": "para", "text": "最後に、As-IsとTo-Beを比較し、導入に向けて何を変える必要があるかを整理します。ギャップ分析の目的は、単に違い を見つけることではなく、現状業務のどこに課題があり、それに対してどのような変更が必要かを明らかにすることで す。"}, {"type": "para", "text": "1.問い合わせ内容の分類 現状では、月 500件 の問い合わせを担当者 3名 が手動で分類しており、担当者ごとに判断基準の ばらつきが生じています。そのため、改善にあたっては、分類の自動化だけでなく、分類基準そのものの統一が必要で す。"}, {"type": "point", "text": ""}, {"type": "para", "text": "2.FAQ検索 現状では、Excelファイル内のキーワード検索によって該当FAQを探していますが、この 方法では検索精度に限界があり、必要な情報を見つけるまでに平均5分程度を要しています。そのた め、改善にあたっては、関連文書を検索して参照できる仕組みへ見直す必要があります。"}, {"type": "para", "text": "3.FAQ回答の作成 現状では、定型的なFAQ回答であっても、担当者が毎回手入力で返信しています。そのため、月 300件 ×15分で、月 75時間 の工数が発生しています。そのため、FAQに該当する問い合わせについては、自動で回答文を作成す る仕組みを導入することが有効です。"}, {"type": "point", "text": ""}, {"type": "para", "text": "4.対応記録の入力 現状では、対応のたびに担当者がExcelへ手入力しているため、入力漏れや誤記が 月20件程度発生しています。そのため、対応内容を自動で記録できるようにし、記録精度とデータ の一貫性を高める必要があります。"}, {"type": "point", "text": ""}, {"type": "para", "text": "現状では、管理者が月末に対応記録を集計し、手作業で月次レポートを作成しています。あるべき 姿では、管理システムから必要なデータを自動集計できるようにし、管理者の集計負荷を軽減する 必要があります。"}, {"type": "para", "text": "このように、ギャップ分析では、現状業務のどこに非効率や品質上の課題があるかを明確にし、それに対してAIエージェ ントや自動化をどのように適用するかを整理します。これにより、導入効果と必要な変更点を具体的に説明しやすくなり ます。"}]}]}]}, {"s": 2, "title": "BPR(業務改革)の基礎", "exam_focus": "本Sectionでは、自動化の前に業務プロセスを見直すことの重要性を理解し、BPRの基本手法であ\nるECRSを用いて改善案を検討できるようになることを目的とします。試験では、ECRSの4つの観\n点の意味と順序、自動化の前に見直しが必要な理由、非効率な業務をそのまま自動化することの問\n題点、As-Is分析との関係が問われます。", "page_start": 110, "blocks": [{"category": "知識", "subtopics": [{"heading": "BPRの本質 プロセスを「改善」するのではなく「再設計」する", "page": 110, "_heading_y": 354.7480163574219, "figures": ["data:image/jpeg;base64,/9j/7gAOQWRvYmUAZAAAAAAB/9sAxQAMCAgICAgMCAgMEAsLCwwPDg0NDhQSDg4TExIXFBIUFBobFxQUGx4eJxsUJCcnJyckMjU1NTI7Ozs7Ozs7Ozs7AQ0KCgwKDA4MDA4RDg4MDREUFA8PERQQERgREBQUExQVFRQTFBUVFRUVFRUaGhoaGhoeHh4eHiMjIyMnJycsLCwCDQoKDAoMDgwMDhEODgwNERQUDw8RFBARGBEQFBQTFBUVFBMUFRUVFRUVFRoaGhoaGh4eHh4eIyMjIycnJywsLP/dAAQAG//AABEIANgBqQMAIgABEQECEQL/xAGiAAACAgMBAAMBAAAAAAAAAAAABAUHAgMGAQgJCgsBAAMAAgEFAQAAAAAAAAAAAAABAgMEBQYHCAkKCxAAAQIDAwIJCAsIcwAAAAAAAQIDAAQRBRIhEzEGFCI0QVFTdLMHFVKRkpPR0hYjMjM2VFVhcYHTCCQ1QmKDobEJChcYGRolJicoKSo3ODk6Q0RFRkdISUpWV1hZWmNkZWZnaGlqcnN1dnd4eXqChIWGh4iJipSVlpeYmZqio6SlpqeoqaqytLW2t7i5usHCw8TFxsfIycrU1dbX2Nna4eLj5OXm5+jp6vDx8vP09fb3+Pn6EQABAQIFBgcGKV0AAAAAAAABAAIRAxIhMUFRUnGhsdEEFCJhgZHhBRMVcpLSBgcICQoWFxgZGiMkJSYnKCkqMjM0NTY3ODk6QkNERUZHSFNiosHC4vBJSlRVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKk5SVlpeYmZqjpKWmp6ipqrKztLW2t7i5usPExcbHyMnK09TV1tfY2drj5OXm5+jp6vHy8/T19vf4+fr/2gAMAwAAARECEQA/ALUiF6mWhoT6rNVOpTMJmDLFKkOJQHQbty+UBFa9vE1FRzk2hPHeUE+l1waJnHkWHkrzkyUvNkUWnVpBp3GECFYU1oy0NyU85Z03Ohl9laW3QpDoQhSgCkKXcuDAjOY9tDRhocsubXIz04Gnm0oUsXHVJSlYqklSUFIBGzWOYRZVsW3a+imzJWYl5WSmpthqbLranpiimEVydFpQDTbBhW2GbYkrT0SIsVSCxL2ZZzcy242Xn1shpSFFs3kpvBFTiDWBCsUzcqmXE2p5tMuUhYeKkhu6rEG8TShrHrExLzTQelnUPNnMttQWg92CRFf25J5WRsuQsyXetKz3LFMvZagkusiacuNpeepgm60SoFWAxpjDllM2cl+1lWZKOTVit2bLy7zLDakompporSstp1F5VygURnMCF2CJ+UXOuWelwGZZabecRQ4IcKkoNaUxKDsxpnLbsqQm25GbfDcw8kKQ3dWpRSSUhWpSaCozmKqlbEfTolfddsZ19SGm3X7KCKMoaWp5JShd8aoJbBSrMpV4YVETmjyWZNq2VpZtWVmZYt 3n8x3pBxls/ae5/Md6w9BDjt1xyyk4VEjxls/ad5/Md6QcZbP2nefzHesPQQR2645ZQ4VEjxls/ad5/Md6QcZbP2nefzHekPQQR2645ZQ4VEjxls/ad5/Md6QcZbP2nefzHekPQQR2645ZQ4VEjxmkNp3n8x3pBxls/ad5/Md6Q9BBHbrjllDhUSPGWz9p3n8x3pBxls/ad5/Md6Q9BBHbrjllDhUSPGWz9p3n8x3pBxlkNp3n8x3pD0EEduuOWUOFRI8ZbP2nefzHekHGWz9p3n8x3pD0EEduuOWUOFRI8ZZDad5/Md6QcZbP2nefzHekPQQR2645ZQ4VEjxls/ad5/Md6Rtl7NkpV3LMt9WXbocWpbqwDnAK1KIHcQzBAW2jIWjllDhURBBBEpr/2Q=="], "elements": [{"type": "para", "text": "BPR(Business Process Reengineering:ビジネスプロセス・リエンジニアリング)とは、既存の業務プロセスを漸進的 に改善するのではなく、根本から問い直して再設計する手法です。"}, {"type": "para", "text": "1990年 代にマイケル・ハマーとジェームズ・チャンピーが提唱し、「なぜその業務が存在するのか」という問いを起点 に、組織の業務構造を白紙から設計し直すことを主張しました。"}, {"type": "para", "text": "当時の文脈では、コンピュータの普及によって「手作業をそのままデジタル化する」組織が続出したことへの批判がBPR の出発点にありました。テクノロジーが変わっても、その上で動くプロセスが旧来のままであれば、本質的な変革は起 きない──この洞察は、AIエージェントが台頭する現代においても、驚くほどそのまま当てはまります。"}, {"type": "para", "text": "BPRが「改善(Improvement)」ではなく「再設計(Reengineering)」という言葉を使う理由は、発想の出発点が根 本的に異なるからです。改善は「今あるものをより良くする」ことを前提にします。再設計は「今あるものが本当に必要 かどうか」を問うことから始めます。この違いは小さいようで、到達できる変革の深さを大きく左右します。"}]}, {"heading": "「汚いプロセスの自動化」という罠", "page": 111, "_heading_y": 322.87579345703125, "figures": [], "elements": [{"type": "para", "text": "AIエージェント導入プロジェクトで最もよくある失敗が、「汚いプロセスの自動化(Automating a Dirty Process)」で す。これはBPRの文脈で古くから指摘されてきた失敗パターンであり、AIエージェントの登場によってより深刻な問題と して再浮上しています。"}, {"type": "para", "text": "たとえば、経費精算業務に次のようなフローがあるとします。"}, {"type": "para", "text": "「領収書を紙で提出→ 3名 の上長に順番に回覧→全員の押印を確認→経理が手入力→会計システムに転記」"}]}, {"heading": "このフローの入力作業をそのままAIエージェントで自動化すると、", "page": 111, "_heading_y": 470.87579345703125, "figures": ["data:image/jpeg;base64,/9j/7gAOQWRvYmUAZAAAAAAB/9sAxQAMCAgICAgMCAgMEAsLCwwPDg0NDhQSDg4TExIXFBIUFBobFxQUGx4eJxsUJCcnJyckMjU1NTI7Ozs7Ozs7Ozs7AQ0KCgwKDA4MDA4RDg4MDREUFA8PERQQERgREBQUExQVFRQTFBUVFRUVFRUaGhoaGhoeHh4eHiMjIyMnJycsLCwCDQoKDAoMDgwMDhEODgwNERQUDw8RFBARGBEQFBQTFBUVFBMUFRUVFRUVFRoaGhoaGh4eHh4eIyMjIycnJywsLP/dAAQAG//AABEIAOsBqQMAIgABEQECEQL/xAGiAAABBQEBAAMBAAAAAAAAAAAAAwQFBgcCAQgJCgsBAAMBAQAABwAAAAAAAAAAAAABAgME  業務をそのまま自動化してしまうことを防ぐうえで重要です。"}]}, {"heading": "ECRSの原則 効果の大きい順に問う", "page": 112, "_heading_y": 504.5534973144531, "figures": [], "elements": [{"type": "para", "text": "BPRを実務で進めるための具体的なフレームワークがECRSです。Eliminate(排除)・Combine(結合)・Rearrange (順序変更)・Simplify(簡素化)の頭文字を取ったもので、この順序で検討することに本質的な意味があります。効果 の大きい改善から着手することで、「本来不要な業務を丁寧に効率化してしまう」という無駄を防ぎます。"}, {"type": "para", "text": "1 Eliminate(排除) 「この業務は存在すべきか」を問う最初に、かつ最も厳しく問うべき問いです。「そもそもこの業務・工程は必要か」を問い、不要であれば丸ごとなくしま す。排除できれば自動化の必要すらなくなるため、効果は最も大きく、コストはゼロです。"}, {"type": "point", "text": ""}, {"type": "para", "text": "重要なのは「なぜこの工程が存在するのか」を担当者が答えられない場合、それは廃止の有力候補 だということです。「昔からそうなっているから」「誰かが必要だと言っていたから」という理由し か出てこない工程は、かつて意味を持っていたが現在は形骸化した手順である可能性が高いです。"}, {"type": "para", "text": "たとえば、経費精算について、「少額の交通費にまで領収書の原本提出を求めている」なら、一定金額以下は申告のみ で処理するように変更し、提出工程そのものを排除できます。"}, {"type": "para", "text": "2 Combine(結合) 「分かれている理由はあるか」を問う排除できないと判断した工程に対して次に問うのが、「複数の工程を一つにまとめられないか」です。業務が部署をまた いで分割されている場合、その分割は情報の引き渡しコストと待ち時間を生みます。分割の理由が「組織の縦割り構造」 や「システムの制約」であれば、統合の余地があります。"}, {"type": "para", "text": "たとえば、「申請書の記入」と「上長への提出」を別工程で行っているなら、申請フォームの送信と同時に上長に自動 通知される仕組みに統合することで、工程間の待ち時間を丸ごと削除できます。"}, {"type": "para", "text": "3 Rearrange(順序変更) 「この順序に根拠はあるか」を問う排除も統合もできない工程については、順序の見直しを検討します。工程の順序が固定されている理由が「慣習」や「前 工程が整ってからでないと次に進めないという思い込み」がある場合、順序を変えるだけで手戻りや待ち時間を大幅に 削減できることがあります。"}, {"type": "para", "text": "たとえば、「全項目を入力してから上長に承認依頼する」フローを「まず概要を共有して方向性の承認を先に得て、詳 細入力は後から行う」に変えることで、差し戻しによる手戻りが減ります。承認の粒度と入力の粒度を分離する発想で す。"}, {"type": "para", "text": "4 Simplify(簡素化) 「これ以上削ぎ落とせないか」を問う排除・統合・順序変更を経てもなお残る工程に対して、最後に「もっとシンプルにできないか」を問います。フォームの Sectionを減らす、選択肢を設ける、テンプレートを用意するなど、工程を残しながら摩擦を下げる手法です。"}, {"type": "para", "text": "たとえば、「報告書に10項目を自由記述で入力する」工程を「必須3項目のみ入力し、残りはテンプレートから選択」に 変えることで、入力の負荷を下げながら情報の品質を一定に保てます。"}]}, {"heading": "BPRの限界と現実的な運用", "page": 114, "_heading_y": 63.748023986816406, "figures": ["data:image/jpeg;base64,/9j/7gAOQWRvYmUAZAAAAAAB/9sAxQAMCAgICAgMCAgMEAsLCwwPDg0NDhQSDg4TExIXFBIUFBobFxQUGx4eJxsUJCcnJyckMjU1NTI7Ozs7Ozs7Ozs7AQ0KCgwKDA4MDA4RDg4MDREU に整理されていなかった」「業務の標準化が不十分だった」といった点について、事 前に確認していた事実に基づいて説明しやすくなります。これにより、問題の原因を個人の責任に単 純化するのではなく、業務プロセスや導入前提の課題として整理しやすくなります。その結果、議 論を責任追及で終わらせるのではなく、業務の見直しやECRSによるプロセス最適化といった次の改 善活動へつなげやすくなります。"}]}]}]}, {"s": 3, "title": "業務可視化の手法", "exam_focus": "本Sectionでは、業務をAIエージェントに委ねられる水準まで分解し、可視化するための4つの手法\nを学びます。試験では、それぞれの手法が何を明らかにするためのものか、また、どの場面でどの\n手法を選ぶべきかを判断する力が問われます。なお、4つの手法は粒度の粗いものから細かいもの\nへ順に整理されており、IPOが最も粗く、業務フロー図が最も詳細な手法に当たります。", "page_start": 121, "blocks": [{"category": "知識", "subtopics": [{"heading": "なぜ業務を「見える形」にする必要があるのか", "page": 121, "_heading_y": 357.7480163574219, "figures": [], "elements": [{"type": "para", "text": "「この業務をAIエージェントに任せたい」と思ったとき、最初の壁になるのが「その業務の中身を正確に説明できるか」 という問題です。"}, {"type": "para", "text": "長年担ってきた業務ほど、担当者の頭の中にしか存在しない手順や判断基準があります。「なんとなくこうしている」 「経験でわかる」という状態のままでは、AIエージェントはもちろん、新しく入ってきた人間にも引き継げません。これ を暗黙知の罠と呼びます。熟練者が無意識に行っている判断や手順は、本人でさえ言語化できていないことが多く、ヒア リングだけでは表面しか拾えません。"}, {"type": "para", "text": "だから最初にやることは、頭の中にある業務を「見える形」に外部化することです。これを業務の可視化と呼びます。可 視化は単なる記録ではなく、AIエージェントに引き継がせる情報の設計図を作る行為です。何を、どの粒度で可視化する かによって、AIエージェントの設計精度が根本から変わります。"}, {"type": "point", "text": ""}, {"type": "para", "text": "可視化には目的と粒度に応じた四つの手法があります。粒度が粗い順に、IPOモデル・SIPOC分析・ HTA・業務フロー図です。粗い手法から始めて必要に応じて詳細な手法に進むのが基本ですが、シン プルな業務であればIPOだけで十分な場合もあります。4つを必ず全部使う必要はなく、「今何を明 らかにしたいか」によって使い分けることが重要です。"}]}, {"heading": "IPOモデル 業務の輪郭を最初に描く", "page": 122, "_heading_y": 63.748023986816406, "figures": ["data:image/jpeg;base64,/9j/7gAOQWRvYmUAZAAAAAAB/9sAxQAMCAgICAgMCAgMEAsLCwwPDg0NDhQSDg4TExIXFBIUFBobFxQUGx4eJxsUJCcnJyckMjU1NTI7Ozs7Ozs7Ozs7AQ0KCgwKDA4MDA4RDg4MDREUFA8PERQQERgREBQUExQVFRQTFBUVFRUVFRUaGhoaGhoeHh4eHiMjIyMnJycsLCwCDQoKDAoMDgwMDhEODgwNERQUDw8RFBARGBEQFBQTFBUVFBMUFRUVFRUVFRoaGhoaGh4eHh4eIyMjIycnJywsLP/dAAQAG//AABEIANsBqQMAIgABEQECEQL/xAGiAAABBAMBAAMAAAAAAAAAAAAFAAIEBwEDBggJCgsBAAIDAAAHAAAAAAAAAAAAAAABAgMEBQYHCAkKCxAAAQIEAAYGBQ4HbgcAAAAAAQIDAAQFEQYSEyE1dDEycrGytAcUFiJBIzZRUlRVYXGBkZOU0dIXJlOSobPTCAkKFRgZGiQlJygpKjM0Nzg5OkJDREVGR0hJSlZXWFlaYmNkZWZnaGlqc3V2d3h5eoKDhIWGh4iJipW 164, "figures": [], "elements": [{"type": "point", "text": "・入力は「社員からの問い合わせテキスト」「社員のOS環境情報」「FAQデータ」"}, {"type": "point", "text": "・処理は「問い合わせ分類・FAQ判定・回答生成・エスカレーション判定」"}, {"type": "point", "text": "・出力は「回答テキスト」「チケットデータ」「月次レポート」です。"}, {"type": "para", "text": "この 3行でAIエージェントに何を渡して何を返してもらうかの骨格が決まります。"}]}, {"heading": "ステップ 2:SIPOC分析で関係者を洗い出す", "page": 126, "_heading_y": 351.7480163574219, "figures": [], "elements": [{"type": "para", "text": "入力を提供する人は「問い合わせをする社員」と「FAQを管理するIT部門」です。出力を受け取る人を洗い出すと、「回 答を受ける社員」「対応状況を確認するIT部門の管理者」だけでなく「月次レポートを見る経営層」も含まれることが わかります。"}, {"type": "para", "text": "経営層向けには「AIエージェント対応率」「コスト削減実績」を含むダッシュボードが必要になるため、この時点で設 計に含めることができます。"}]}, {"heading": "ステップ 3:HTAでAエージェントIと人間の役割を決める", "page": 126, "_heading_y": 491.7480163574219, "figures": [], "elements": [{"type": "para", "text": "問い合わせ対応業務をアトミック‧タスクまで分解し、担当を割り当てます。"}, {"type": "para", "text": "「問い合わせのカテゴリを判定する」はAI処理、「回答をメールテンプレートに挿入して送信する」は定型処理、「クレ ーム案件の対応方針を決める」は人間が担います。"}]}, {"heading": "ステップ 4:業務フロー図でチームに共有する", "page": 126, "_heading_y": 595.748046875, "figures": ["data:image/jpeg;base64,/9j/7gAOQWRvYmUAZAAAAAAB/9sAxQAMCAgICAgMCAgMEAsLCwwPDg0NDhQSDg4TExIXFBIUFBobFxQUGx4eJxsUJCcnJyckMjU1NTI7Ozs7Ozs7Ozs7AQ0KCgwKDA4MDA4RDg4MDREUFA8PERQQERgREBQUExQVFRQTFBUVFRUVFRUaGhoaGhoeHh4eHiMjIyMnJycsLCwCDQoKDAoMDgwMDhEODgwNERQUDw8RFBARGBEQFBQTFBUVFBMUFRUVFRUVFRoaGhoaGh4eHh4eIyMjIycnJywsLP/dAAQAG//AABEIAOIBqQMAIgABEQECEQL/xAGiAAACAgMBAAMBAAAAAAAAAAAABAEFAwYHAggJCgsBAAMBAAAHAQAAAAAAAAAAAAABAgMEBQYHCAkKCxAAAQMCAgMFCgoNCmcAAAAAAQIDBAARBRITITEUFTVBswYiMlFVYXFzk9MHU1RygZGSocHSIzM0QlJidJSx0dTw8QgJChYXGBlkg6MaJCUmJygpKjY3ODk6Q0RFRkdISUpWV1hZWmNlZmdoaWp1dnd4eXqChIWGh4iJipWWl5iZmqKkpaanqKmqsrS1tre4ubrCw8TFxsfIycrV1tfY2drh4uPk5ebn6Onq8vP09fb3+Pn6EQABAgECBgoJKFsAAAAAAAABABECITEDElFxgsEiQWGRkqGxstHhBDIzNFKB0uLwBQYHCAkKExQVFhcYGRojJCUmJygpKjU2Nzg5OkJDREVGR0hJYmNy8UpTVFVWV1hZWmRlZmdoaWpzdHV2d3h5eoOEhYaHiImKk5SVlpeYmZqio6SlpqeoqaqztLW2t7i5usLDxMXGx8jJytPU1dbX2Nna4+Tl5ufo6ery8/T19vf4+fr/2gAMAwAAARECEQA/AOqUjiGN4VhTjbWISEsreF20m ents": [{"type": "para", "text": "ここまで分析が進んだ内容を1枚の図にまとめます。社員・AIエージェント・IT担当者・管理者をスイムレーンに並べ、 問い合わせが来てから解決するまでの流れを矢印でつなぎます。"}, {"type": "para", "text": "図を見せることで「AIエージェントがエスカレーション判定をした後、IT担当者への引き継ぎが曖昧」「クレーム案件の 判断基準が明文化されていない」といった問題がチームの議論で浮かび上がります。業務フロー図はこうした認識合わせ の場で力を発揮します。"}]}]}, {"category": "コラム", "subtopics": [{"heading": "コラム：業務フロー図作成の「現実」とAIの進化", "page": 130, "_heading_y": 618.748046875, "figures": [], "elements": [{"type": "para", "text": "業務フロー図(スイムレーン図)は、「誰が、何を、どの順番でやるか」というチーム全体の認識をすり合わせる上で、 最も強力な可視化ツールです。"}, {"type": "para", "text": "その一方で、図の要素が複雑になるほど、箱や矢印の配置、レイアウトの修正、議論のたびの更新など、作図と維持管 理に大きな手間がかかるという現実的な課題があります。"}, {"type": "para", "text": "ただ、この業務フローを作るためにも、生成AIが活躍します。業務手順や関係者をテキストで与えるだけで、AIが業務の 流れを分析し、業務フロー図を自動生成してくれます。これにより、担当者は複雑な作図作業から解放され、業務の設計 や認識合わせに集中できます。"}, {"type": "subhead", "text": "事例画像(経費精算の業務フロー図)"}, {"type": "para", "text": "Google Workspaceに標準で付属された作図ツール(Draw.io)があります。 以下は、「Draw.ioで経費精算に関する業務 フロー図を作って」と指示して作成した図です。"}]}]}, {"category": "コラム", "subtopics": [{"heading": "コラム：他人の業務を聞き出すための問い", "page": 131, "_heading_y": 141.74803161621094, "figures": [], "elements": [{"type": "para", "text": "AIエージェント導入を推進する立場では、自分自身の業務ではなく、他者が行っている業務を可視化しなければならない 場面が多くあります。しかし、これは必ずしも容易ではありません。"}, {"type": "para", "text": "その理由の一つは、業務に慣れている担当者ほど、日常的に行っている手順を明示的に意識していない場合があるためで す。長年同じ業務を担当していると、判断の基準や手順の一部が経験として身についており、自分では当然のこととして 処理しているため、言葉で説明しにくくなります。"}, {"type": "para", "text": "その結果、業務内容を尋ねても、「普段どおりに処理している」「感覚的に判断している」といった答えにとどまり、 必要な情報を十分に引き出せないことがあります。"}, {"type": "point", "text": ""}, {"type": "para", "text": "したがって、「どのような業務を行っていますか」といった抽象的な問いだけでは、実際の手順や 判断基準を十分に把握できない場合があります。そのため、業務を可視化する際には、複数の観点 から具体的に掘り下げて確認することが重要です。以下では、そのための5つの切り口を示します。"}, {"type": "subhead", "text": "仕事の「起点」を聞く"}, {"type": "para", "text": "何がきっかけでその仕事が始まるかを聞きます。業務の起点を特定すると、IPOの「Input」が明確になります。「なん となく毎朝やっている」という業務も、必ず何かがトリガーになっています。"}, {"type": "subhead", "text": "「実際に何をするか」を聞く"}, {"type": "para", "text": "手順を聞くときは「どんな業務ですか?」ではなく「実際に画面や手を動かす順番」を聞きます。可能であれば実際に やってみてもらうのが最も効果的で、言葉では出てこなかった手順が自然に出てきます。"}, {"type": "subhead", "text": "「イレギュラー」を聞く"}, {"type": "para", "text": "業務の説明は「うまくいくケース」だけになりがちです。AIエージェントが詰まるのはほぼ必ずイレギュラーなケースな ので、丁寧に聞きます。「自分で判断している」と出てきたものが、HTAで「人間が担うべき判断処理」の候補になりま す。"}, {"type": "subhead", "text": "「終わり」を聞く"}, {"type": "para", "text": "業務の完了条件を聞きます。ここも意外と曖昧になりやすいポイントです。「終わったあとに何を渡すか」がIPOの 「Output」と、SIPOCの「Outoput」・「Customer」に対応します。"}, {"type": "subhead", "text": "「関係者」を聞く"}, {"type": "para", "text": "自分以外に誰が関わっているかを聞きます。特に「休んだときに誰がやるか」は効果的な問いで、引き継ぎの存在が出て くると、自分では気づいていなかった関係者やルールが浮かび上がることがあります。"}, {"type": "subhead", "text": "聞くときの心がけ"}, {"type": "para", "text": "問いと同じくらい大事なのが「聞き方の姿勢」です。業務を可視化する目的が「業務の問題点を指摘すること」だと相 手に受け取られると、正直に話してもらえなくなります。「あなたの仕事を正しく理解したい」「うまくAIエージェント をサポートに使えるようにしたい」という姿勢で臨むことが、正確な情報を引き出す前提になります。"}]}]}]}]}</script>

let searchMode  = false;

function stKey(secS, idx) { return `ch${data.ch}_s${secS}_st${idx}`; }
function getStatus(k) { return LS.get('status_' + k, ''); }
function setStatus(k, v) { LS.set('status_' + k, v); }
function getBm(k)   { return LS.get('bm_' + k, false); }
function setBm(k,v) { LS.set('bm_' + k, v); }
function getMemo(k) { return LS.get('memo_' + k, ''); }
function setMemo(k,v) { LS.set('memo_' + k, v); }

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function applyDark() {
  document.body.classList.toggle('dark', darkMode);
  document.getElementById('dark-btn').textContent = darkMode ? '☀️' : '🌙';
}
function applyFontSize() {
  document.documentElement.style.setProperty('--font-size', fontSize + 'px');
}

// ─── 要素レンダリング ───
function renderElements(elements) {
  if (!elements || !elements.length) return '';
  let html = '';
  for (const el of elements) {
    if (!el) continue;
    switch (el.type) {
      case 'para':
        if (!el.text || !el.text.trim()) continue;
        html += `<p class="body-para">${esc(el.text)}</p>`;
        break;
      case 'point': {
        const content = el.text ? esc(el.text) : '';
        html += `<div class="point-box"><span class="point-label">📌 POINT</span><div class="point-body">${content}</div></div>`;
        break;
      }
      case 'sub': {
        const titleHtml = esc(el.title || '');
        const bodyHtml  = el.text ? `<div class="sub-block-body">${esc(el.text)}</div>` : '';
        html += `<div class="sub-block"><div class="sub-block-title">${titleHtml}</div>${bodyHtml}</div>`;
        break;
      }
      case 'subhead':
        html += `<div class="subhead">${esc(el.text || '')}</div>`;
        break;
      case 'concept':
        html += `<div class="concept-name">${esc(el.title || '')}</div>`;
        break;
      case 'table': {
        const headers = (el.headers || []).map(h => `<th>${esc(h)}</th>`).join('');
        const rows = (el.rows || []).map(row =>
          `<tr>${row.map(c => `<td>${esc(c)}</td>`).join('')}</tr>`
        ).join('');
        html += `<div class="inline-table-wrap"><table class="inline-table"><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table></div>`;
        break;
      }
      case 'quiz': {
        const qid = 'q' + Math.random().toString(36).slice(2,8);
        const choicesHtml = (el.choices || []).map(c =>
          `<div class="quiz-choice"><span class="quiz-choice-label">${esc(c.label)}</span><span>${esc(c.text)}</span></div>`
        ).join('');
        const answerHtml = el.answer
          ? `<div class="quiz-answer-label">正解: ${esc(el.answer)}</div><div class="quiz-explanation">${esc(el.explanation)}</div>`
          : '';
        html += `<div class="quiz-card">
          <div class="quiz-question">${esc(el.question)}</div>
          <div class="quiz-choices">${choicesHtml}</div>
          <div class="quiz-answer-wrap">
            <button class="quiz-reveal-btn" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'▲ 正解を隠す':'▼ 正解を見る'">▼ 正解を見る</button>
            <div class="quiz-answer" id="${qid}">${answerHtml}</div>
          </div>
        </div>`;
        break;
      }
    }
  }
  return html;
}

// ─── 全体レンダリング ───
function renderAll() {
  const main    = document.getElementById('main');
  const tocRoot = document.getElementById('toc-root');
  main.innerHTML = '';
  tocRoot.innerHTML = '';

  // ─── チャプター横断ナビ ───
  const CH_LIST = [
    {n:1, title:'生成AIとAIエージェントの基礎'},
    {n:2, title:'業務の基礎'},
    {n:3, title:'AIデータリテラシーとマネジメント'},
    {n:4, title:'自動化レベルとワークフロー設計'},
    {n:5, title:'人と組織から考えるAI時代の組織設計'},
    {n:6, title:'AIエージェントを実装するDモデル'}
  ];
  const chNav = document.createElement('div');
  chNav.style.cssText = 'border-bottom:2px solid var(--border);padding-bottom:4px;margin-bottom:4px;';
  CH_LIST.forEach(c => {
    const a = document.createElement('a');
    a.href = `./ch${c.n}.html`;
    const isCurrent = (c.n === data.ch);
    a.style.cssText = 'display:flex;align-items:center;gap:8px;padding:9px 14px;text-decoration:none;border-bottom:1px solid var(--border);font-size:13px;';
    if (isCurrent) {
      a.style.cssText += 'background:var(--accent-light);color:var(--accent);font-weight:700;';
    } else {
      a.style.cssText += 'color:var(--text2);';
    }
    a.innerHTML = `<span style="min-width:32px;font-size:11px;font-weight:700;color:var(--accent);">Ch${c.n}</span><span>${esc(c.title)}</span>`;
    chNav.appendChild(a);
  });
  tocRoot.appendChild(chNav);

  data.sections.forEach(sec => {
    const tocSec    = document.createElement('div');
    tocSec.className = 'toc-sec';
    const tocSecBtn = document.createElement('button');
    tocSecBtn.className = 'toc-sec-btn';
    tocSecBtn.innerHTML = `<span>S${sec.s}｜${esc(sec.title)}</span><span>›</span>`;
    const tocStList = document.createElement('div');
    tocStList.className = 'toc-st-list';
    tocSecBtn.onclick = () => tocStList.classList.toggle('open');
    tocSec.appendChild(tocSecBtn);
    tocSec.appendChild(tocStList);
    tocRoot.appendChild(tocSec);

    const secBlock = document.createElement('div');
    secBlock.className = 'section-block';
    secBlock.id = `sec-${sec.s}`;

    let headerHTML = `
      <div class="section-header">
        <h2>Section ${sec.s}｜${esc(sec.title)}</h2>
        <div class="sec-meta">p.${sec.page_start}</div>
      </div>`;

    if (sec.exam_focus) {
      const efText = esc(sec.exam_focus).replace(/\n/g, '<br>');
      headerHTML += `<div class="exam-focus-card">
        <span class="ef-label">🎯 学習のポイント</span>
        <p>${efText}</p>
      </div>`;
    }

    secBlock.innerHTML = headerHTML;
    main.appendChild(secBlock);

    let stGlobalIdx = 0;
    sec.blocks.forEach(block => {
      const blockDiv = document.createElement('div');
      blockDiv.className = 'block-group';
      blockDiv.innerHTML = `<div class="block-header cat-${esc(block.category)}">${esc(block.category)}</div>`;
      secBlock.appendChild(blockDiv);

      block.subtopics.forEach((st, i) => {
        const key  = stKey(sec.s, stGlobalIdx);
        stGlobalIdx++;
        const card = renderSubtopic(st, key, sec.s, block.category);
        blockDiv.appendChild(card);

        const tocBtn = document.createElement('button');
        tocBtn.className = 'toc-st-btn';
        tocBtn.textContent = st.heading;
        tocBtn.onclick = () => {
          closeDrawer();
          card.scrollIntoView({ behavior: 'smooth', block: 'start' });
          openSubtopic(card);
        };
        tocStList.appendChild(tocBtn);
      });
    });
  });
}

function renderSubtopic(st, key, secS, cat) {
  const status = getStatus(key);
  const bm     = getBm(key);
  const memo   = getMemo(key);

  const card = document.createElement('div');
  const sc = status === 'known' ? ' status-known' : status === 'unsure' ? ' status-unsure' : status === 'unknown' ? ' status-unknown' : '';
  card.className = 'subtopic-card' + sc;
  card.id = 'st-' + key;
  card.dataset.key    = key;
  card.dataset.status = status;
  card.dataset.cat    = cat;

  let figHTML = '';
  if (st.figures && st.figures.length) {
    figHTML = '<div class="st-figures">';
    st.figures.forEach(uri => {
      figHTML += `<figure><img src="${uri}" alt="図解" loading="lazy" onclick="openImgModal(this.src)"></figure>`;
    });
    figHTML += '</div>';
  }

  const elemHTML = renderElements(st.elements);

  function sbClass(s) { return `status-btn${status === s ? ' active-' + s : ''}`; }

  card.innerHTML = `
    <div class="st-header" onclick="toggleSubtopic(this.parentElement)">
      <div class="st-heading">${esc(st.heading)}</div>
      <span class="st-page">p.${st.page}</span>
      <span class="st-toggle">▼</span>
    </div>
    <div class="st-body">
      ${elemHTML}
      ${figHTML}
    </div>
    <div class="st-actions">
      <button class="${sbClass('known')}"   data-status="known"   onclick="setStatusBtn(event,'${key}')">✓ 既知</button>
      <button class="${sbClass('unsure')}"  data-status="unsure"  onclick="setStatusBtn(event,'${key}')">△ 要確認</button>
      <button class="${sbClass('unknown')}" data-status="unknown" onclick="setStatusBtn(event,'${key}')">✗ 未理解</button>
      <button class="bm-btn-st${bm ? ' active' : ''}" onclick="toggleBm(event,'${key}')">★</button>
    </div>
    <textarea class="st-memo${memo ? ' open' : ''}" placeholder="メモ…"
      onchange="setMemo('${key}',this.value)">${esc(memo)}</textarea>
  `;
  return card;
}

function openSubtopic(card) {
  card.querySelector('.st-body').classList.add('open');
  card.querySelector('.st-toggle').textContent = '▲';
}

window.toggleSubtopic = function(card) {
  const body   = card.querySelector('.st-body');
  const toggle = card.querySelector('.st-toggle');
  body.classList.toggle('open');
  toggle.textContent = body.classList.contains('open') ? '▲' : '▼';
  if (body.classList.contains('open') && getBm(card.dataset.key)) {
    card.querySelector('.st-memo').classList.add('open');
  }
};

window.setStatusBtn = function(e, key) {
  e.stopPropagation();
  const btn   = e.currentTarget;
  const newSt = getStatus(key) === btn.dataset.status ? '' : btn.dataset.status;
  setStatus(key, newSt);
  const card = document.getElementById('st-' + key);
  card.dataset.status = newSt;
  card.className = 'subtopic-card' + (newSt === 'known' ? ' status-known' : newSt === 'unsure' ? ' status-unsure' : newSt === 'unknown' ? ' status-unknown' : '');
  card.querySelectorAll('.status-btn').forEach(b => {
    const s = b.dataset.status;
    b.className = `status-btn${newSt === s ? ' active-' + s : ''}`;
  });
  applyFilter();
};

window.toggleBm = function(e, key) {
  e.stopPropagation();
  const newBm = !getBm(key);
  setBm(key, newBm);
  e.currentTarget.classList.toggle('active', newBm);
  const card = document.getElementById('st-' + key);
  card.querySelector('.st-memo').classList.toggle('open', newBm);
};

function applyFilter() {
  document.querySelectorAll('.subtopic-card').forEach(card => {
    const st = card.dataset.status || '';
    let hide = false;
    if      (activeFilter === 'unknown') hide = st !== 'unknown';
    else if (activeFilter === 'unsure')  hide = st !== 'unsure';
    else if (activeFilter === 'known')   hide = st === 'known';
    card.classList.toggle('hidden', hide);
  });
}
document.getElementById('filter-chips').addEventListener('click', e => {
  const btn = e.target.closest('[data-filter]');
  if (!btn) return;
  activeFilter = btn.dataset.filter;
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.toggle('active', b === btn));
  applyFilter();
});

document.getElementById('search-btn').onclick = () => {
  searchMode = !searchMode;
  document.getElementById('search-bar').style.display = searchMode ? 'block' : 'none';
  if (searchMode) document.getElementById('search-input').focus();
  else {
    document.getElementById('search-input').value = '';
    document.querySelectorAll('.subtopic-card').forEach(c => c.classList.remove('hidden'));
    applyFilter();
  }
  bmViewMode = false;
  document.getElementById('bm-view').style.display = 'none';
  document.getElementById('main').style.display = 'block';
};
document.getElementById('search-input').oninput = function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { applyFilter(); return; }
  document.querySelectorAll('.subtopic-card').forEach(card => {
    const text = card.querySelector('.st-heading').textContent.toLowerCase()
               + ' ' + card.querySelector('.st-body').textContent.toLowerCase();
    card.classList.toggle('hidden', !text.includes(q));
  });
};

document.getElementById('bm-btn').onclick = () => {
  bmViewMode = !bmViewMode;
  document.getElementById('bm-view').style.display    = bmViewMode ? 'block' : 'none';
  document.getElementById('main').style.display       = bmViewMode ? 'none' : 'block';
  if (bmViewMode) renderBmList();
};
function renderBmList() {
  const list = document.getElementById('bm-list');
  list.innerHTML = '';
  let found = 0;
  data.sections.forEach(sec => {
    let idx = 0;
    sec.blocks.forEach(block => {
      block.subtopics.forEach(st => {
        const key = stKey(sec.s, idx++);
        if (getBm(key)) {
          found++;
          const m = getMemo(key);
          const item = document.createElement('div');
          item.className = 'bm-item';
          item.innerHTML = `
            <div class="bm-item-heading">${esc(st.heading)}</div>
            <div class="bm-item-meta">S${sec.s}｜${esc(sec.title)} / p.${st.page}</div>
            ${m ? `<div class="bm-item-memo">${esc(m)}</div>` : ''}`;
          item.onclick = () => {
            bmViewMode = false;
            document.getElementById('bm-view').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            const card = document.getElementById('st-' + key);
            if (card) { card.scrollIntoView({ behavior: 'smooth' }); openSubtopic(card); }
          };
          list.appendChild(item);
        }
      });
    });
  });
  if (!found) list.innerHTML = '<div class="bm-empty">ブックマークがまだありません</div>';
}

window.openImgModal = function(src) {
  document.getElementById('img-modal-img').src = src;
  document.getElementById('img-modal').classList.add('open');
};
document.getElementById('img-modal').onclick = function(e) {
  if (e.target === this || e.target.id === 'img-modal-close')
    this.classList.remove('open');
};

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
document.getElementById('menu-btn').onclick = () => {
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
};
document.getElementById('overlay').onclick = closeDrawer;

const slider = document.getElementById('font-slider');
slider.value = fontSize;
slider.oninput = () => { fontSize = +slider.value; applyFontSize(); LS.set('fontSize', fontSize); };

document.getElementById('dark-btn').onclick = () => {
  darkMode = !darkMode; applyDark(); LS.set('dark', darkMode);
};

const bc = document.getElementById('breadcrumb');
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const sec = data.sections.find(s => `sec-${s.s}` === e.target.id);
      if (sec) bc.textContent = `第${data.ch}章 > S${sec.s} ${sec.title}`;
    }
  });
}, { rootMargin: '-50px 0px -70% 0px' });

applyDark();
applyFontSize();
renderAll();
applyFilter();
document.querySelectorAll('.section-block').forEach(el => observer.observe(el));

})();
</script>
</body>
</html>
