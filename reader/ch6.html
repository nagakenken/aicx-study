<style>

  --border: #374151; --accent-light: #1e1b4b;

  --cat-case: #451a03; --cat-case-text: #fcd34d;
  --cat-column: #3b0764; --cat-column-text: #d8b4fe;

body {

/* ── ヘッダー ── */
#header {
  position: sticky; top: 0; z-index: 100; background: var(--accent); color: #fff;
  display: flex; align-items: center; padding: 0 10px; height: 50px; gap: 8px;

#drawer {

  background: var(--surface); z-index: 201; overflow-y: auto;

}
#drawer.open { left: 0; }
#drawer-header { background: var(--accent); color: #fff; padding: 14px 16px; font-weight: 700; font-size: 14px; }
.toc-sec { border-bottom: 1px solid var(--border); }

  color: var(--text); font-size: 13px; font-weight: 700; cursor: pointer; text-align: left;
}
.toc-sec-btn:hover { background: var(--surface2); }

.toc-st-list.open { display: block; }
.toc-st-btn {
  display: block; width: 100%; padding: 7px 14px 7px 26px;
  background: none; border: none; color: var(--text2); font-size: 12px; cursor: pointer; text-align: left;
}
.toc-st-btn:hover { background: var(--surface2); color: var(--accent); }

/* ── ツールバー ── */
#toolbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 8px 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.chip {
  padding: 4px 11px; border-radius: 999px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2); font-size: 12px; cursor: pointer; white-space: nowrap;
}
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
#font-slider { width: 80px; accent-color: var(--accent); }

/* ── 検索バー ── */
#search-bar { display: none; background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 12px; }
#search-input {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--surface2); color: var(--text); font-size: 14px;
}
#search-input:focus { outline: 2px solid var(--accent); }

/* ── パンくず ── */
#breadcrumb {
  background: var(--surface2); padding: 5px 12px; font-size: 11px;
  color: var(--text3); border-bottom: 1px solid var(--border); min-height: 26px;
}

/* ── メインコンテンツ ── */
#main { padding: 0 0 80px; }
.section-block { margin: 0; }
.section-header { background: var(--accent); color: #fff; padding: 16px 14px 12px; }
.section-header h2 { font-size: 16px; font-weight: 800; }
.section-header .sec-meta { font-size: 11px; opacity: .75; margin-top: 4px; }

/* 学習のポイント */
.exam-focus-card {
  background: var(--accent-light); border: 1px solid var(--accent2);
  border-radius: 8px; padding: 12px 14px; margin: 12px 14px 4px;
}
.exam-focus-card .ef-label {
  font-size: 11px; font-weight: 700; color: var(--accent);
  display: block; margin-bottom: 6px; letter-spacing: .05em;
}
.exam-focus-card p { font-size: 13px; color: var(--text2); line-height: 1.75; }

/* ブロックグループ */
.block-group { margin: 0; }
.block-header {
  padding: 7px 14px; font-size: 12px; font-weight: 700;
  border-bottom: 1px solid var(--border); border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}
.block-header::before { content: ''; display: inline-block; width: 4px; height: 14px; border-radius: 2px; background: currentColor; opacity: .6; }
.cat-知識 { background: var(--cat-knowledge); color: var(--cat-knowledge-text); }
.cat-業務シナリオ { background: var(--cat-scenario); color: var(--cat-scenario-text); }
.cat-実践事例 { background: var(--cat-case); color: var(--cat-case-text); }
.cat-コラム { background: var(--cat-column); color: var(--cat-column-text); }
.cat-理解度チェック { background: var(--cat-check); color: var(--cat-check-text); }

/* ─── サブトピックカード ─── */
.subtopic-card { border-bottom: 1px solid var(--border); background: var(--surface); transition: background .15s; }
.subtopic-card.hidden { display: none; }
.subtopic-card.status-known { background: var(--status-known-bg); }
.subtopic-card.status-unsure { background: var(--status-unsure-bg); }
.subtopic-card.status-unknown { background: var(--status-unknown-bg); }

.st-header { display: flex; align-items: flex-start; gap: 8px; padding: 12px 14px 8px; cursor: pointer; user-select: none; }
.st-heading { flex: 1; font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.4; }
.st-page { font-size: 11px; color: var(--text3); white-space: nowrap; margin-top: 3px; }
.st-toggle { font-size: 14px; color: var(--text3); margin-top: 2px; }

.st-body { padding: 2px 14px 10px; display: none; }
.st-body.open { display: block; }

/* ─── 本文要素スタイル ─── */

/* 通常段落 */
.body-para {
  color: var(--text2); font-size: 14px; margin-bottom: 12px;
  line-height: var(--line-height); word-break: break-word;
}
.body-para:last-child { margin-bottom: 0; }

/* POINT ボックス */
.point-box {
  background: var(--point-bg); border-left: 3px solid var(--point-border);
  border-radius: 0 6px 6px 0; padding: 10px 12px; margin: 12px 0;
}
.point-label {
  font-size: 11px; font-weight: 800; color: var(--point-border);
  display: block; margin-bottom: 6px; letter-spacing: .05em;
}
.point-box .point-body { color: var(--point-text); font-size: 13px; line-height: 1.75; }

/* サブブロック（・テキスト生成AI、強化学習、判断N 等） */
.sub-block {
  border: 1px solid var(--sub-border); border-left: 3px solid var(--sub-title);
  border-radius: 0 8px 8px 0; padding: 10px 12px; margin: 8px 0;
  background: var(--sub-bg);
}
.sub-block + .sub-block { margin-top: 6px; }
.sub-block-title {
  font-size: 14px; font-weight: 700; color: var(--sub-title);
  margin-bottom: 6px; line-height: 1.4; padding-bottom: 5px;
  border-bottom: 1px solid var(--sub-border);
}
.sub-block-body { color: var(--text2); font-size: 13px; line-height: 1.75; }

/* 小見出し行（判断N 等のインライン見出し：本文より大きく、sub-blockより軽い） */
.subhead {
  font-size: 15px; font-weight: 700; color: var(--sub-title);
  margin: 16px 0 6px; padding: 6px 10px;
  background: var(--sub-bg); border-left: 3px solid var(--sub-border);
  border-radius: 0 4px 4px 0;
}
.concept-name {
  font-size: 13px; font-weight: 700; color: var(--concept-color);
  margin: 8px 0 3px;
}

/* 理解度チェック quizカード */
.quiz-card { border: 1px solid var(--sub-border); border-radius: 8px; margin: 10px 0; overflow: hidden; }
.quiz-question { background: var(--sub-bg); padding: 10px 12px; font-size: 13px; color: var(--text); line-height: 1.7; }
.quiz-question::before { content: "問 "; font-weight: 700; color: var(--sub-title); }
.quiz-choices { padding: 8px 12px; }
.quiz-choice { display: flex; gap: 8px; padding: 5px 0; font-size: 13px; color: var(--text2); border-bottom: 1px solid var(--border); }
.quiz-choice:last-child { border-bottom: none; }
.quiz-choice-label { font-weight: 700; color: var(--sub-title); min-width: 18px; flex-shrink: 0; }
.quiz-answer-wrap { padding: 8px 12px; background: var(--surface2); }
.quiz-reveal-btn {
  font-size: 12px; padding: 4px 12px; border-radius: 999px;
  border: 1px solid var(--sub-border); background: var(--sub-bg);
  color: var(--sub-title); cursor: pointer; font-weight: 700;
}
.quiz-answer { display: none; margin-top: 8px; font-size: 13px; line-height: 1.7; }
.quiz-answer.open { display: block; }
.quiz-answer-label { font-weight: 700; color: #16a34a; margin-bottom: 4px; }
.quiz-explanation { color: var(--text2); }

/* インラインテーブル（図解再現用） */
.inline-table-wrap { overflow-x: auto; margin: 10px 0; }
.inline-table {
  border-collapse: collapse; width: 100%; font-size: 13px;
  border: 1px solid var(--sub-border); border-radius: 6px; overflow: hidden;
}
.inline-table thead { background: var(--sub-title); }
.inline-table thead th {
  color: #fff; font-weight: 700; padding: 7px 10px;
  text-align: center; border-right: 1px solid rgba(255,255,255,.3);
}
.inline-table thead th:last-child { border-right: none; }
.inline-table tbody td {
  padding: 8px 10px; text-align: center; color: var(--text);
  border-right: 1px solid var(--sub-border); border-top: 1px solid var(--sub-border);
}
.inline-table tbody td:last-child { border-right: none; }

/* ─── アクションボタン ─── */
.st-actions { display: flex; gap: 6px; padding: 4px 14px 10px; flex-wrap: wrap; }
.status-btn {
  padding: 4px 11px; border-radius: 999px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2); font-size: 12px; cursor: pointer;
}
.status-btn.active-known  { background: #16a34a; color: #fff; border-color: #16a34a; font-weight: 700; }
.status-btn.active-unsure { background: #d97706; color: #fff; border-color: #d97706; font-weight: 700; }
.status-btn.active-unknown{ background: #dc2626; color: #fff; border-color: #dc2626; font-weight: 700; }
.bm-btn-st {
  padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text3); font-size: 12px; cursor: pointer;
}
.bm-btn-st.active { color: #f59e0b; border-color: #f59e0b; background: #fffbeb; }

/* メモ */
.st-memo {
  display: none; width: calc(100% - 28px); margin: 0 14px 10px;
  padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface2); color: var(--text); font-size: 13px;
  resize: vertical; min-height: 55px; font-family: inherit; line-height: 1.6;
}
.st-memo.open { display: block; }

/* 図解 */
.st-figures { margin: 10px 0 4px; }
.st-figures figure { margin: 0 0 10px; text-align: center; }
.st-figures figure img {
  max-width: 100%; border-radius: 8px; cursor: zoom-in;
  border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,.1);
}

/* ── 画像モーダル ── */
#img-modal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.88);
  z-index: 500; align-items: center; justify-content: center;
}
#img-modal.open { display: flex; }
#img-modal img { max-width: 96vw; max-height: 92vh; border-radius: 6px; touch-action: pinch-zoom; }
#img-modal-close {
  position: absolute; top: 10px; right: 14px; color: #fff;
  font-size: 30px; cursor: pointer; background: none; border: none; line-height: 1;
}

/* ── ブックマーク一覧 ── */
#bm-view { display: none; padding: 16px 14px 80px; }
#bm-view h2 { font-size: 16px; font-weight: 800; margin-bottom: 12px; }
.bm-item {
  border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; margin-bottom: 10px; cursor: pointer; background: var(--surface);
}
.bm-item:hover { border-color: var(--accent); }
.bm-item-heading { font-size: 14px; font-weight: 700; }
.bm-item-meta { font-size: 12px; color: var(--text3); margin-top: 3px; }
.bm-item-memo { font-size: 12px; color: var(--text2); margin-top: 5px; font-style: italic; }
.bm-empty { color: var(--text3); font-size: 14px; text-align: center; padding: 40px; }
</style>

<script id="content" type="application/json">{"ch": 6, "title": "AIエージェントを実装するDモデル", "sections": [{"s": 1, "title": "発見・選定", "exam_focus": "本Sectionは、5Dモデルの最初のステップに当たります。ここでは、組織内のどの業務をAIエージ\nェント導入の対象とすべきかを見極め、優先順位を定める方法を学びます。試験では、ボトルネッ\nク分析、AI適合性診断、優先順位マトリクスという三つの手法について、それぞれの目的と使い分\nけを理解していることが求められます。", "page_start": 353, "blocks": [{"category": "知識", "subtopics": [{"heading": "5Dモデルの全体像", "page": 353, "_heading_y": 357.7480163574219, "figures": [], "elements": [{"type": "para", "text": "AIエージェント導入プロジェクトは5つのステップで構成されます。Discovery、Definition、Design、Development & PoC、Deployment & Scaleです。頭文字がすべてDであることから「5Dモデル」と呼びます。"}, {"type": "para", "text": "本Sectionで扱うDiscoveryはその第1ステップにあたり、「何を自動化するか」を決める段階です。設計図を書くわけで も、プロトタイプを作るわけでもありません。組織の中で最もインパクトが大きく、かつAIエージェントに向いている業 務を見つけ出すことだけに集中します。"}]}, {"heading": "ボトルネックの特定から始める", "page": 353, "_heading_y": 497.7480163574219, "figures": [], "elements": [{"type": "para", "text": "ボトルネックとは、プロセス全体の生産性を制約している最も弱い箇所のことです。Discoveryの出発点は、このボトル ネックの特定にあります。「処理に時間がかかりすぎている」「ミスが頻発している」「特定の担当者に依存している」 「反復的で付加価値が低い」といった特徴を持つ業務を洗い出していきます。"}, {"type": "para", "text": "限られたリソースでAIエージェント導入を進める以上、最もインパクトの大きい箇所から着手しなければ投資対効果は出 ません。この分析では、Section9〜11で学んだ業務分析手法を活用します。ただしDiscoveryでは業務の詳細な構造化ま では行いません。「どこに問題があるか」の発見に集中し、詳細な分解は次のStep 2: Definitionで行います。"}]}, {"heading": "AIエージェントに向いているかを見極める", "page": 353, "_heading_y": 655.748046875, "figures": [], "elements": [{"type": "para", "text": "ボトルネックを特定しただけでは、AI化すべきかは判断できません。次に必要なのは、その業務がAIエージェントによる 解決に適しているかどうかの診断です。"}, {"type": "para", "text": "AIエージェントによる解決に適しているかどうかの判断基準は 3つあります。"}, {"type": "para", "text": "第1に「 非構造化データの処理を含むか」。Section1・13で学んだ通り、メール文面、報告書、画像といった非構造化デ ータの処理はLLMの最大の強みです。逆に、構造化データの検索や集計が中心の業務は従来のシステムで十分です。"}, {"type": "para", "text": "第2に「文脈に応じた判断が必要か」。Section4で学んだ通り、手順が完全に定義できる業務はルールベースの自動化が 適しています。文脈を読んで柔軟に対応する必要がある業務こそ、LLMの出番です。"}, {"type": "para", "text": "第3に「ある程度のミスが許容できるか、またはHuman-in-the-Loopで補完できるか」。LLMの出力は確率的であり、 100% の正確性は保証できません。ミスが許容できない業務はAI適合性が低く、ミスがあっても人間の確認で補完できる 業務はAI適合性が高いと言えます。"}, {"type": "para", "text": "一方、AI適合性が低い業務もあります。 ・ 100% の正確性が法的に要求される業務 ・対人関係や共感が本質的な業務 ・ 扱うデータが極秘で外部APIに送信できない業務 ・物理的な操作が伴う業務です。「ボトルネックだからAI化すべき」ではなく「ボトルネックであり、かつAIエージェントに向いている業務を選 ぶ」。この2段階のフィルタリングがDiscoveryの核心です。"}]}, {"heading": "優先順位マトリクスで「何から着手するか」を決める", "page": 354, "_heading_y": 257.7480163574219, "figures": [], "elements": [{"type": "para", "text": "ボトルネックであり、かつAIエージェント導入に適した業務が複数見つかった場合でも、それらすべてに同時に着手する ことは現実的ではありません。そのため、各候補業務について、「期待できる効果の大きさ」と「実現のしやすさ」の2 つの観点から整理し、優先順位を判断します。"}, {"type": "para", "text": "最も優先すべきなのは、効果が大きく、かつ実現しやすい業務です。この領域は、比較的短期間で成果を示しやすいた め、初期導入の有力な候補となります。一方で、効果は大きいものの実現が難しい業務については、すぐに着手するので はなく、中長期の検討対象として位置づけることが適切です。"}]}]}, {"category": "業務シナリオ", "subtopics": [{"heading": "業務シナリオ：採用スクリーニングAIでのDiscovery", "page": 354, "_heading_y": 416.6960144042969, "figures": ["data:image/jpeg;base64,/9j/7gAOQWRvYmUAZAAAAAAB/9sAxQAMCAgICAgMCAgMEAsLCwwPDg0NDhQSDg4TExIXFBIUFBobFxQUGx4eJxsUJCcnJyckMjU1NTI7Ozs7Ozs7Ozs7AQ0KCgwKDA4MDA4RDg4MDREUFA8PERQQERgREBQUExQVFRQTFBUVFRUVFRUaGhoaGhoeHh4eHiMjIyMnJycsLCwCDQoKDAoMDgwMDhEODgwNERQUDw8RFBARGBEQFBQTFBUVFBMUFRUVFRUVFRoaGhoaGh4eHh4eIyMjIycnJywsLP/dAAQAG//AABEIAOcBqQMAIgABEQECEQL/xAGiAAABBQEBAAMBAAAAAAAAAAAEAAIDBQcGAQgJCgsBAAIDAAEFAQAAAAAAAAAAAAABAgMEBQYHCAkKCxAAAQMCAQMHCwgHXBsAAAAAAQIDBAARBRITIQYxNEFzkbMUFVFSVWFicYGh0QcWIiMyU1SSF0JDgpOj4QgJChgZGiQlJicoKSozNTY3ODk6REVGR0hJSlZXWFlaY2RlZmdoaWpydHV2d3h5eoOEhYaHiImKlJWWl5iZmqKkpaanqKmqsbK0tba3uLm6wcLDxMXGx8jJytPU0tXW19jZ2uLj5OXm5+jp6vDx8vP09fb3+Pn6EQABAgEGAwQIBoMAAAAAAAABAAIRAxIhMUFRcZHBBFJhgQUTIlNiobHRBjIzguHwBwgJChQVFhcYGRojJCUmJygpKjQ1Njc4OTpCQ0RFRkdISUpUVVZXWFlaY2RlZmdoaWpyc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uLj5OXm5+jp6vHy8/T19vf4+fr/2gAMAwAAARECEQA/ANSUpKElajZKQSTzhpNAox/BnFJSiW2SspCbXsSrN2ANrG+eTv1Ji+b41yg8nLQWFgpGQdcW8XITv6KyeHmEYg22tm7KHQsKyGAlRcKsoBSkJQRZPcBe2jRraNOZszNlmucSRNugq5SULCBCtay9iuGR5HEkiUy2/a+aWtKV2sVaxN9YXp8WfCmtB+I+282UBeUhQNkqFwTyOrXEarGJknVBlIyRHagLWpL4SlooSEZxIutGV3FzXuNJIvaptSCCjCMSZzvG9Qb を占めます。LLMが最も強みを発揮する領域です。"}, {"type": "point", "text": ""}, {"type": "para", "text": "文脈に応じた判断が必要か — 同じスキルセットでも、職務経歴の書き方やプロジェクト実績の表現 は人によって異なります。「Python 5年」と明記してある場合もあれば、「データ分析基盤の構築 をリードし、主にPythonを用いた開発を担当」のように文脈から読み取る必要がある場合もありま す。ルールベースでは処理しきれない柔軟な読解が求められます。"}, {"type": "para", "text": "ミスが許容できるか、HITLで補完できるか — 一次スクリーニングの段階では、AIエージェントの判定を人事担当者が確 認するHuman-in-the-Loopを組み込むことで、ミスを補完できます。最終的な採用判断は人間が行うため、一次スクリ ーニングでのAIエージェントのミスは致命的ではありません。"}, {"type": "para", "text": "したがってAI適合性は高いと判断できます。ただし、採用選考には固有の注意点があります。AIエージェントが性別や年 齢、出身大学などの属性に基づいてスコアリングを行うバイアスのリスクです。この対策はSection28のセキュリティ設 計で扱います。"}, {"type": "subhead", "text": "判断3"}, {"type": "subhead", "text": "クイックウィンの選定"}, {"type": "para", "text": "採用ポジションの中で、エンジニア職を最初の対象として選定します。理由は、スキル要件が技術的に明確であるためAI エージェントの評価精度が出やすく、応募数が最も多いため効果が大きく、スキルマッチングの正解/不正解が比較的客 観的に判断できるためです。"}, {"type": "para", "text": "営業職や管理職は、コミュニケーション力やリーダーシップといった定性的な評価が求められるため、AI適合性がエンジ ニア職より低くなります。今回はあくまで一例として、エンジニア職で精度と運用を確認してから、対象職種を段階的に 広げていくことをMVPアプローチとして決定します。"}]}]}]}, {"s": 2, "title": "定義・構造化", "exam_focus": "本Sectionでは、Discoveryで選定したユースケースを、AIエージェントの設計・開発に渡せる具体\n的な形へ落とし込むステップを扱います。試験では、業務フローチャート、要件定義書、ペルソナ\n定義、合格基準という四つの成果物について、それぞれの役割と記載内容が問われます。", "page_start": 360, "blocks": [{"category": "知識", "subtopics": [{"heading": "業務フローチャートによる暗黙知の可視化", "page": 360, "_heading_y": 338.7480163574219, "figures": [], "elements": [{"type": "para", "text": "Definitionの最初の作業は、対象業務をフローチャートとして詳細に可視化することです。Discoveryでは「この業務に 問題がある」と発見しましたが、Definitionでは「その業務が具体的にどのような手順で行われているか」を書き出しま す。"}, {"type": "para", "text": "暗黙知のまま進めると「AIエージェントに任せる範囲」と「人間が担う範囲」の切り分けが曖昧になり、後続のDesign 以降で手戻りが発生します。ここでSection11のHTAやIPOモデルの手法が本格的に活用されます。"}]}, {"heading": "要件定義書の作成", "page": 360, "_heading_y": 478.7480163574219, "figures": [], "elements": [{"type": "point", "text": ""}, {"type": "para", "text": "「要件定義書」と聞くと、ITエンジニアが作成する技術的で複雑な文書を想像するかもしれませ ん。しかし、AIエージェント・ストラテジストに求められるのは、最初から完全な要件定義書を一 人で作成することではありません。重要なのは、何を実現したいのか、どの程度の品質を求めるの か、何を扱ってよくて何を扱ってはいけないのか を、叩き台として言語化できることです。"}, {"type": "para", "text": "たとえば、「この業務を自動化したい」「このくらいの速度で動いてほしい」「この情報は扱えない」といった内容を 整理できれば、それを出発点として、実装を担う人材と一緒に具体化していくことができます。したがって、ストラテジ ストの役割は、最初から正確で完全な文書を作り切ることではなく、検討の土台となる要件を整理し、叩き台を提示す ることにあります。"}, {"type": "point", "text": ""}, {"type": "para", "text": "そのためには、要件定義書にどのような内容を含めるべきかを理解しておくことが重要です。主な 構成要素は、次の4つです。"}, {"type": "point", "text": "・機能要件"}, {"type": "para", "text": "機能要件とは、AIエージェントに何をさせたいのかを定めるものです。たとえば、「応募書類からスキル情報を抽出す る」「求人要件と照合して適合度を算出する」といった内容がこれに当たります。"}, {"type": "point", "text": "・非機能要件"}, {"type": "para", "text": "非機能要件とは、どの程度の品質や条件で動作してほしいのかを定めるものです。たとえば、「30秒以内に結果を返 す」「平日の日中は安定して利用できる」といった、応答速度、安定性、可用性などに関する期待水準がこれに当たり ます。整理のしかたとしては、「何をするか」が機能要件、「どの水準で実現するか」が非機能要件 と捉えると理解し やすくなります。"}, {"type": "point", "text": "・制約条件"}, {"type": "para", "text": "制約条件とは、設計や運用において守らなければならないルールです。たとえば、「応募者の性別や年齢を評価に用いて はならない」といった法務・倫理・業務ルール上の制約がこれに当たります。"}]}, {"heading": "前提条件", "page": 361, "_heading_y": 597.748046875, "figures": [], "elements": [{"type": "para", "text": "前提条件とは、設計を進めるうえで、あらかじめ満たされているとみなす条件です。"}, {"type": "point", "text": ""}, {"type": "para", "text": "たとえば、「応募書類はPDFまたはWord形式で提出される」「求人要件は採用管理システムに登録 済みである」といった条件がこれに当たります。前提条件が実際には満たされていない場合、設計 そのものを見直す必要が生じるため、事前に明確にしておくことが重要です。"}, {"type": "para", "text": "このように、要件定義書は、単に開発のための文書というだけではありません。ストラテジストが業務側の要求を整理 し、実装側と認識をそろえるための共通の土台でもあります。ストラテジストが作成した叩き台に対して、実装担当者が 技術的観点から補足や修正を加えながら精度を高めていくことで、はじめて実現可能な設計へとつながります。"}, {"type": "para", "text": "このような共同作業こそが、Definitionの重要な役割です。"}]}, {"heading": "ペルソナの定義", "page": 362, "_heading_y": 314.7480163574219, "figures": [], "elements": [{"type": "para", "text": "ペルソナの定義とは、AIエージェントを利用するユーザーの典型像を具体的に描写し、誰がどのようなニーズからこのエ ージェントを使うのかを明確にすることです。この定義が曖昧だと「技術的にはすごいが、誰も使わないエージェント」 になるリスクがあります。"}, {"type": "point", "text": ""}, {"type": "para", "text": "AI固有のペルソナで重要なのは、年齢や役職といった属性情報ではなく「この人はAIエージェント の出力をどう使って、どんな判断を下すのか」を描写することです。たとえば「AIエージェントのス コアを見て一次選考の合否を判断する人事担当者」と「スコアの根拠を見て面接対象者を絞り込む エンジニアリングマネージャー」では、AIエージェントの出力に求めるものがまったく違います。前 者はスコアの信頼性を、後者はスコアの根拠の具体性を重視します。この違いが、機能要件の設計 に直結します。"}, {"type": "para", "text": "見落としやすいのが「間接ユーザー」のペルソナです。AIエージェントの直接ユーザーだけでなく、AIエージェントの出 力を確認・監督する社内担当者もペルソナとして定義すべきです。Section11のSIPOC分析で学んだ「出力の受取者を漏 れなく洗い出す」考え方が、ここで活きます。"}]}, {"heading": "合格基準の事前定義", "page": 363, "_heading_y": 63.748023986816406, "figures": [], "elements": [{"type": "para", "text": "合格基準とは、AIエージェントの品質が「業務に使えるレベルに達しているか」を判断するための定量的な基準です。 Definitionの段階で定義しておく理由は、Step 4のDevelopment & PoCでの検証の合否判定に使うためです。"}, {"type": "para", "text": "合格基準が事前に決まっていなければ、PoCの結果を見て「これで十分なのか」が主観的判断になります。合格基準の設 定には「なんとなく 90% 以上」ではなく、業務上の要求から逆算した根拠が必要です。"}, {"type": "para", "text": "合格基準とKPIの区別も押さえてください。合格基準は「PoCの合否を判定する一回限りの基準」、KPIは「運用中の継 続的な成果測定に使う指標」です。"}]}]}, {"category": "業務シナリオ", "subtopics": [{"heading": "業務シナリオ：採用スクリーニングAIでのDefinition", "page": 363, "_heading_y": 230.69602966308594, "figures": ["data:image/jpeg;base64,/9j/7gAOQWRvYmUAZAAAAAAB/9sAxQAMCAgICAgMCAgMEAsLCwwPDg0NDhQSDg4TExIXFBIUFBobFxQUGx4eJxsUJCcnJyckMjU1NTI7Ozs7Ozs7Ozs7AQ0KCgwKDA4MDA4RDg4MDREUFA8PERQQERgREBQUExQVFRQTFBUVFRUVFRUaGhoaGhoeHh4eHiMjIyMnJycsLCwCDQoKDAoMDgwMDhEODgwNERQUDw8RFBARGBEQFBQTFBUVFBMUFRUVFRUVFRoaGhoaGh4eHh4eIyMjIycnJywsLP/dAAQAG//AABEIAOoBqgMAIgABEQECEQL/xAGiAAAABwEBAAMAAAAAAAAAAAAAAQIDBAUHBggJCgsBAAMBAQACAgMAAAAAAAAAAAABAgMEBQYHCAkKCxAAAQIDAgQKDAkGLkMAAAAAAQIDAAQRBRIGEyFBIjEyNFFxcnOy0RQVFiUzVWGRkpOx0wcXI1JTZIHS4kJDVGOh8AgJChgZGiQmJygpKjU2Nzg5OkRFRkdISUpWV1hZWmJlZmdoaWp0dXZ3eHmCo+F6g4SFhoeIiYqUlZaXmJmaoqSlpqeoqaqztLW2t7i5usHCw8TFxsfIycrU1dbX2Nna4+Tl5ufo6erx8vP09fb3+Pn6EQABAgEFAwoEB4EAAAAAAAABABECAxIhMUETUYEEIkJSU2FxkcHRFDKSsQUVgqHh8PEGBwgJChYXGBkaIyQlJicoKSozNDU2Nzg5OkNERUZHSElKVFVWV1hZWmJjZGVmZ2hpanJzdHV2d3h5eoOEhYaHiImKk5SVlpeYmZqio6Slpqeoqaqys7S1tre4ubrCw8TFxsfIycrS09TV1tfY2dri4+Tl5ufo6ery8/T19vf4+fr/2gAMAwAAARECEQA/ANPmpliSl3JqaWG2mklS1nSAEV8rhTYU5MplJeaQp1xVxA0go1WMh+2H1myIkW0HDZUylpKlrU3dSlAWpdSQKgIy1jirAsi3ZC2EPzMo4hht9LadEpwJSpKV0ITpCqq1FUhVa6UbyUlJxyccURaKF2DgPReKiOOKGIABwa6F1a8LLAbUUOTVwhwtqvocRRQClGt5IyAJNTmifyxkb0ujHoCpxJVLgmhcAAJu108hjPnsHp/xd1SH3L868660W5hxsJS 視化します。業務は次の6ステップで構成されているこ とがわかりました。"}, {"type": "para", "text": "応募書類の受領:応募者からの履歴書‧職務経歴書をメールまたは採用管理システムで受け付ける書類の形式確認:必要書類が揃っているか、フォーマットに不備がないかを確認する"}, {"type": "para", "text": "スキル要件の照合:職務経歴書からスキル‧経験を読み取り、求人要件と照合する"}, {"type": "para", "text": "一次評価の判定:照合結果に基づき「通過」「不通過」「保留」を判定する"}, {"type": "para", "text": "評価コメントの作成:判定理由を記録し、次の面接担当者に共有する"}, {"type": "para", "text": "結果通知:応募者に一次選考の結果をメールで通知する"}, {"type": "para", "text": "各ステップのAIエージェントと人間の役割分担は以下の通りです。ステップ1・2は定型処理として自動化します。ステッ プ3はAIエージェントがスキル抽出と照合を担当します。ステップ4はAIエージェントが一次判定案を生成し、人事担当者 が最終判定を行います。導入初期はHuman-in-the-Loopで全件を人間が確認します。"}, {"type": "para", "text": "ステップ5はAIエージェントが評価コメントのドラフトを生成します。ステップ6は判定結果に基づきメールを自動送信 します。"}, {"type": "para", "text": "Discoveryでは「スクリーニングに月間 670時間 かかっている」という認識にとどまっていましたが、Definitionでは6つ のステップに分解して役割分担を具体的に切り分けています。この粒度の違いがDiscoveryとDefinitionの境界線です。"}, {"type": "subhead", "text": "判断2"}, {"type": "subhead", "text": "要件定義書の作成"}, {"type": "para", "text": "機能要件として5点を定義しました。応募書類のPDFやWordファイルからテキストを抽出する。職務経歴書からスキル・ 経験・年数を構造化データとして抽出する。求人要件との適合度を100点満点でスコアリングする。スコアに基づき「通 過」「不通過」「保留」の判定案を生成する。判定理由の評価コメントを自動生成する。"}, {"type": "para", "text": "非機能要件として、 1件 あたりの処理時間は30秒以内、スコアリングの再現性は同一書類に対して±5点以内のブレ、 24 時間 稼働としました。"}, {"type": "para", "text": "制約条件として、応募者の氏名・住所・生年月日・顔写真はスコアリング処理には使用しないこと、スコアリングに使 用するのはスキル・経験・資格のみとすることを定めました。 これはバイアス防止のための重要な制約であり、氏名や 出身大学をスコアリングに含めると、無意識のバイアスがAIエージェントに再現されてしまうリスクがあります。"}, {"type": "subhead", "text": "判断3"}, {"type": "subhead", "text": "ペルソナ定義"}, {"type": "para", "text": "ペルソナAは人事担当者です。「中堅企業の人事担当者。採用経験 5年 。月間 400件 のエンジニア職応募書類を担当。技術 的なスキル評価には自信がなく、現在はエンジニアリングマネージャーに都度確認している。AIエージェントのスコアリ ングに技術的な根拠が示されていれば、自信を持って一次判定を下せる。」"}, {"type": "para", "text": "ペルソナBはエンジニアリングマネージャーです。「開発チームのマネージャー。面接の時間を確保するのが大変で、一 次スクリーニングの質が上がれば面接対象者が絞られて助かる。AIエージェントの評価に『なぜこのスコアなのか』の根 拠が欲しい。根拠がないスコアは信用できない。」"}, {"type": "para", "text": "ペルソナBの「スコアの根拠が欲しい」という要求から、機能要件「判定理由の評価コメントを自動生成する」が導き出 されました。スコアだけでなく「Python経験 5年 、要件 3年 以上 → ◎。マネジメント経験なし、要件:あれば尚可 → △」のような根拠付きの評価が必要です。"}, {"type": "subhead", "text": "判断4"}, {"type": "subhead", "text": "合格基準の設定"}, {"type": "para", "text": "スキル要件マッチングの適合度スコアの精度は 90% 以上とします。ベテラン人事担当者の判定と一致する割合で測定し ます。 90% の根拠は、現状の担当者間の一致率が 85% であり、AIがこれを上回ることを最低条件としたためです。"}, {"type": "para", "text": "「通過/不通過」判定の一致率は 85% 以上とします。「保留」判定が多くなりすぎると人事担当者の確認工数が減らない ため、保留率は 20% 以下を基準とします。"}, {"type": "para", "text": "処理時間は 1件 あたり30秒以内とします。現行の20分と比較して大幅な短縮を実現する水準です。"}, {"type": "para", "text": "バイアステストとして、同一スキルセットで氏名・性別・年齢を変えた10パターンの模擬応募書類を入力し、スコアの 差が±3点以内であることを確認します。採用スクリーニングAI固有の合格基準であり、公平性を担保するための重要な テストです。"}]}]}]}, {"s": 3, "title": "設計・プロンプト", "exam_focus": "本Sectionでは、Definitionで整理した要件を、具体的な技術設計へ落とし込む方法を学びます。設\n計は、コンテキスト設計、I/O設計、セキュリティ設計の3つの領域に分けて考えます。試験では、\nそれぞれの領域で扱う手法や用語を正しく区別し、どの設計論点がどの領域に属するかを判断でき\nることが求められます。", "page_start": 369, "blocks": [{"category": "知識", "subtopics": [{"heading": "なぜDesignが独立したステップとして必要か", "page": 369, "_heading_y": 357.7480163574219, "figures": [], "elements": [{"type": "para", "text": "Definitionで「何をやりたいか」が決まりました。しかし「何をやりたいか」と「どう実現するか」の間には大きなギャ ップがあります。「応募書類からスキルを抽出してスコアリングしたい」という要件だけでは、AIエージェントは動かせ ません。どんな指示を与えるか、出力をどんな形式で受け取るか、どんなデータを渡してはいけないか。"}, {"type": "para", "text": "これらを具体的に設計するのがDesignです。"}, {"type": "para", "text": "Designステップには 3つの設計領域があります。コンテキスト設計、I/O設計、セキュリティ設計です。"}]}, {"heading": "コンテキスト設計 — AIエージェントにどう指示するか", "page": 369, "_heading_y": 505.7480163574219, "figures": ["data:image/jpeg;base64,/9j/7gAOQWRvYmUAZAAAAAAB/9sAxQAMCAgICAgMCAgMEAsLCwwPDg0NDhQSDg4TExIXFBIUFBobFxQUGx4eJxsUJCcnJyckMjU1NTI7Ozs7Ozs7Ozs7AQ0KCgwKDA4MDA4RDg4MDREUFA8PERQQERgREBQUExQVFRQTFBUVFRUVFRUaGhoaGhoeHh4eHiMjIyMnJycsLCwCDQoKDAoMDgwMDhEODgwNERQUDw8RFBARGBEQFBQTFBUVFBMUFRUVFRUVFRoaGhoaGh4eHh4eIyMjIycnJywsLP/dAAQAG//AABEIAMwBqQMAIgABEQECEQL/xAGiAAADAAIDAAMBAAAAAAAAAAAABAcFBgECAwgJCgsBAAIDAQABBQAAAAAAAAAAAAQFAAEDAgYHCAkKCxAAAQIDAgQJBw4HcQAAAAAAAQIDAAQRBRIGEyExFDQ2QVFzdLGzByIyU2GSkxUWF1JUgZGUoaLR0tPhCCMkRGJxcgkKGBkaJSYnKCkqMzU3ODk6QkNFRkdISUpVVldYWVpjZGVmZ2hpanV2d3h5eoKDhIWGh4iJipWWl5iZmqOkpaanqKmqsrS1tre4ubrBwsPExcbHyMnK1NXW19jZ2uL RKdKHrmmeh9/B0oeuaY6H38NwRIjBsVEp0oeuWZ6H38HSh65pjoffw3BEiMGxUSnSh65pnoffx0cdenS2y2w40kOtuOLdAQAG1BdAKkkkpAh6CLlAUCfGqRGPlnnpJlMo9LurLIuJcaSFoUkcieSqDTOCM8ZCCKBhMREGpWlNHjrLMdD7+OOlAdZZjoffw5BFxGDYqJPpQHWWY6H38Gjx1lmOh9/DkESIwbFRKaPHWWY6H38caPHWWY6H38OQRIjBsVEp0oeuWY6H38DJemJvRSmlMtttKbQHKBaipSVKNATQC4KVhuCJEXgoiCCCOVEQQQRFEQQQRFEQQQRFEQQQRFF//9k="], "elements": [{"type": "para", "text": "コンテキスト設計は、Section21で学んだコンテキストエンジニアリングの考え方を、Designステップの具体的な設計作 業として実装するものです。"}, {"type": "para", "text": "Section21が「AIエージェントに渡す情報をどう考えるか」の原則論であるのに対し、ここでは「システムプロンプトに 何を書くか」「Few-shotにどんな例を入れるか」「Chain-of-Thoughtでどう推論させるか」という具体的な手法に踏み 込みます。"}, {"type": "para", "text": "システムプロンプトは、AIエージェントの役割・前提条件・制約条件を定義する最上位の指示にあたります。「あなたは エンジニア採用の一次スクリーニング担当です」のように、AIエージェントがどんな立場で何をすべきかを役割として明 示します。"}, {"type": "para", "text": "このとき、AIエージェントの出力品質を高める代表的な技法が 2つあります。"}, {"type": "para", "text": "Few-shotプロンプトとは、 入力例と出力例の組み合わせをプロンプトに含めることで、AIエージェントに期待する出力 の形式や判断傾向を示す手法です。 たとえば、職務経歴書に対してどのような観点でスコアを付けるべきかを示した入 出力例を数件与えることで、AIエージェントの出力パターンを安定させやすくなります。"}, {"type": "para", "text": "一方で、Few-shotは、どの例を与えるかによって出力品質が大きく左右される手法でもあります。偏った例だけを並べ ると、AIエージェントはその偏りを出力パターンとして強く学習し、似たケースには対応できても、少し条件の異なるケ ースでは判断が不安定になりやすくなります。"}, {"type": "para", "text": "たとえば、スキル要件に明確に合致する候補者の例だけを並べると、合格か不合格かが微妙な候補者に対する判定が不 安定になることがあります。"}, {"type": "point", "text": ""}, {"type": "para", "text": "そのため、例を選ぶ際には、明確な合格例、明確な不合格例、判断が分かれやすい境界事例など、 異なるパターンをバランスよく含めることが重要です。Few-shotは有効な手法ですが、例の選び方 を誤ると、かえって精度を下げるおそれがある点に注意が必要です。"}, {"type": "para", "text": "この弱点を補う実務的な方法として、例そのものを並べるだけでなく、例から判断ルールを抽出するという考え方があ ります。具体的には、入出力例をそのままプロンプトに載せるのではなく、まずAIエージェントに複数の例を分析させ、 どのような基準で判断しているのかを言語化させます。"}, {"type": "para", "text": "そのうえで、人間がその内容を確認し、必要に応じて修正し、整理された判断ルールをシステムプロンプトへ組み込みま す。"}, {"type": "para", "text": "この方法の利点は、個別の例に依存しにくくなることです。例は特定のケースに対しては有効ですが、そこから整理され たルールは、より幅広いケースに適用しやすくなります。そのため、未知のパターンに対する対応力を高めやすくなりま す。"}, {"type": "para", "text": "Chain-of-Thoughtは、AIエージェントに思考過程を段階的に出力させる手法です。たとえば採用スクリーニングであれ ば、「まず職務経歴書からスキルキーワードを抽出し、次に各スキルの経験年数を特定し、求人要件と1項目ずつ照合 し、最後に総合スコアを算出する」のように、推論の順序を明示的に指示します。"}, {"type": "para", "text": "Chain-of-Thoughtが有効な理由は、LLMが「一気に答えを出す」よりも「段階を踏んで考える」ほうが正確性が上がる ためです。人間でも「直感で答える」より「紙に書きながら順番に考える」ほうが複雑な問題を正確に解けるのと同じ原 理です。"}, {"type": "para", "text": "Chain-of-Thoughtが有効なのは、LLMが一度に結論だけを出すよりも、判断の過程を段階的にたどる方が、複雑な問題 で正確性が高まりやすいためです。これは、人間が複雑な問題を考えるときに、直感だけで答えるよりも、紙に書き出し ながら順序立てて考える方が正確になりやすいことと似ています。"}, {"type": "para", "text": "実務上の注意点は、推論の段階が増えるほど、使用するトークン量も増えやすいことです。 Section8で扱った推論モデ ルは、このような段階的な考え方を行いやすいように設計されたモデルです。一方で、通常のLLMであっても、「順を追 って判断する」「まず条件を整理してから結論を出す」といった指示をプロンプトで与えることで、同様の考え方をある 程度促すことができます。"}, {"type": "para", "text": "ただし、この方法をすべてのタスクに使う必要はありません。たとえば、「スキル要件を複数の観点で照合し、そのうえ で総合判定を行う」といった、複数の判断を組み合わせる処理に限定して用いることで、コストと精度のバランスを取 りやすくなります。"}]}, {"heading": "I/O設計 — AIエージェントとどんな形式でやり取りするか", "page": 371, "_heading_y": 372.1963195800781, "figures": ["data:image/jpeg;base64,/9j/7gAOQWRvYmUAZAAAAAAB/9sAxQAMCAgICAgMCAgMEAsLCwwPDg0NDhQSDg4TExIXFBIUFBobFxQUGx4eJxsUJCcnJyckMjU1NTI7Ozs7Ozs7Ozs7AQ0KCgwKDA4MDA4RDg4MDREUFA8PERQQERgREBQUExQVFRQTFBUVFRUVFRUaGhoaGhoeHh4eHiMjIyMnJycsLCwCDQoKDAoMDgwMDhEODgwNERQUDw8RFBARGBEQFBQTFBUVFBMUFRUVFRUVFRoaGhoaGh4eHh4eIyMjIycnJywsLP/dAAQAG//AABEIAOUBqQMAIgABEQECEQL/xAGiAAACAgMBAQADAAAAAAAAAAAABAMHAgUGCAEJCgsBAAMBAQACAgMAAAAAAAAAAAABAgMEBQYHCAkKCxAAAQIDAgMKCg0FcQAAAAAAAQIDAAQRBRIGEyEUMTVRYXN0k7LTFRYiNEFSU1Sz0gcjVVZicYGRkpShsdEIJTI2QgkKFxgZGiQmJygpKjM3ODk6Q0RFRkdISUpXWFlaY2RlZmdoaWpydXZ3eHl6goOEhYaHiImKlZaXmJmaoqOkpaanqKmqtLW2t7i5usHCw8TFxsfIycrU1dbX2Nna4eLj5OXm5+jp6vDx8vP09fb3+Pn6EQABAgEEBQkGCX0AAAAAAAABAAIRAxIhMQRBcYHBEyJRUmGRodHhQmJyscLwBQYyM1OCkrLiBwgJChQVFhcYGRojJCUmJygpKjQ1Njc4OTpDREVGR0hJSlRVVldYWVpjZGVmZ2hpanN0dXZ3eHl6g4SFhoeIiYqTlJWWl5iZmqKjpKWmp6ipqrO0tba3uLm6w8TFxsfIycrS09TV1tfY2drj5OXm5+jp6vHy8/T19vf4+fr/2gAMAwAAARECEQA/ALSccQ02p1w3UISVKJzgAKkxC3aEk61LPtupU3OECXUK9WVSVimTlUkwWglSrPmUpBUoy7oCRlJJSaARztkSc7Mytny6kLYzFYdElaVIpMTCcWM8DKlKDXSrGjGNc0uJhA4DhgpLiDACsLcsYQ2JMzvA9icbXMXlJCATlUnxJKTS6SOSAY+P4Q2TLOPNOvKC5dSUuJS24s1UQkAXUm8ankVjmWEvzF が必要になります。AIエージェントが次の候補者では「85点くらいだと思います」と返した ら、「くらい」という抽象的な言葉をどう扱うかでシステムが止まります。"}, {"type": "point", "text": ""}, {"type": "para", "text": "この問題を防ぐために、AIエージェントの出力は、あらかじめ決めた形式で返させる必要がありま す。その代表的な形式がJSONです。JSONとは、項目名と値を対応させて記述するデータ形式であ り、たとえば overall_score: 85 や recommendation: 通過 のように、どこに何の情報が入っている かを明確に示すことができます。形式が統一されていれば、採用管理システムは必要な情報を機械 的に取り出して登録しやすくなります。"}, {"type": "para", "text": "ここでいうスキーマとは、JSONの構造をあらかじめ定めた設計ルールのことです。たとえば、どの項目を含めるのか、 各項目には文字列・数値・真偽値のどの型を使うのか、どの項目を必須にするのか、値の範囲をどこまで許容するの か、といった内容を事前に決めておきます。つまり、スキーマは、JSONをどの形で出力させるかを定める設計図に当た ります。"}, {"type": "point", "text": ""}, {"type": "para", "text": "このようにスキーマを定めておくことで、AIエージェントの出力が期待した形式になっているかどう かを、自動で確認できるようになります。この確認の仕組みをバリデーションといいます。バリデー ションの結果、必要な項目が欠けている、数値であるべき項目に文字列が入っている、といった不 整合が見つかった場合には、AIエージェントに再生成を求める、または人間へ引き継ぐといった対 応を、あらかじめ設計しておくことが重要です。"}]}, {"heading": "セキュリティ設計 — AIエージェントに何を見せて何を見せないか", "page": 372, "_heading_y": 616.32763671875, "figures": [], "elements": [{"type": "point", "text": ""}, {"type": "para", "text": "セキュリティ設計とは、AIエージェントが業務上必要な範囲で安全に動作するように、情報の入力 と出力の両面を制御する設計です。ここで重要なのは、「AIエージェントに何を見せるか」と「AIエ ージェントに何を出させるか」の両方を管理することです。"}, {"type": "para", "text": "前者に当たるのがアクセス制御です。アクセス制御とは、AIエージェントが参照できる情報の範囲を制限することを指し ます。たとえば、応募書類を処理する際に、AIエージェントの処理に不要な氏名や住所をあらかじめ除外またはマスキン グしたうえで渡す、あるいは特定の機密文書にはアクセスできないようにする、といった設計がこれに当たります。"}, {"type": "para", "text": "後者に当たるのがガードレールです。ガードレールとは、AIエージェントの出力内容や動作に制限を設ける仕組みです。 たとえば、AIエージェントの回答に個人情報や不適切な表現が含まれている場合に、その出力を遮断したり、再生成を求 めたりする仕組みがこれに当たります。"}, {"type": "point", "text": ""}, {"type": "para", "text": "このように、セキュリティ設計では、入力段階で参照範囲を制御し、出力段階で不適切な内容を防 ぐという二重の考え方が重要です。"}]}, {"heading": "ストラテジストがDesignで果たす役割", "page": 373, "_heading_y": 494.7480163574219, "figures": ["data:image/jpeg;base64,/9j/7gAOQWRvYmUAZAAAAAAB/9sAxQAMCAgICAgMCAgMEAsLCwwPDg0NDhQSDg4TExIXFBIUFBobFxQUGx4eJxsUJCcnJyckMjU1NTI7Ozs7Ozs7Ozs7AQ0KCgwKDA4MDA4RDg4MDREUFA8PERQQERgREBQUExQVFRQTFBUVFRUVFRUaGhoaGhoeHh4eHiMjIyMnJycsLCwCDQoKDAoMDgwMDhEODgwNERQUDw8RFBARGBEQFBQTFBUVFBMUFRUVFRUVFRoaGhoaG , "text": "その上で、Few-shotの例も補助的に 3件 含めます。合格・不合格・ボーダーラインの3パターンをバランスよく入れるこ とで、ルールだけでは伝わりにくい「判定の粒度感」をAIエージェントに示します。"}, {"type": "subhead", "text": "判断2"}, {"type": "subhead", "text": "I/O設計 — 評価レポートの構造化"}, {"type": "para", "text": "AIエージェントの出力をJSON形式で構造化し、採用管理システムへの登録や人事担当者への通知といった後続の処理に 接続しやすい設計にします。"}, {"type": "para", "text": "{ \"candidate_id\": \"ENG-2026-0042\", \"overall_score\": 85, \"recommendation\": \" 通過 \", \"skill_evaluation\": [ { \"skill\": \"Python\", \"candidate_level\": \"5 年の実務経験 \", \"requirement\": \"3 年以上 \", \"match\": \" ◎ \", \"comment\": \"Web アプリケーション開発で 5 年間継続使用 \" } ], \"confidence\": 0.92, \"bias_check_passed\": true }設計のポイントは3つあります。第1に、skill_evaluationを配列にすることで、Section別の評価根 拠がペルソナBの要求を満たします。第2に、confidenceはAIエージェントの判定確信度を表すフィ ールドで、確信度が低い場合に自動的に人事担当者の確認を求めるルールを設計できます。第3に、 bias_check_passedフラグにより、バイアスチェックの結果を後続処理で参照できます。"}, {"type": "subhead", "text": "判断3"}, {"type": "subhead", "text": "セキュリティ設計 — バイアス防止と個人情報保護"}, {"type": "para", "text": "入口側の制限であるアクセス制御として、応募書類をAIエージェントに送信する前に、氏名・性別・年齢・顔写真・出身 大学名をマスキングする前処理を設計します。プロンプトで「使用しない」と指示するだけでなく、そもそもAIエージェ ントにバイアスの元になる情報を見せない設計が、セキュリティ・バイ・デザインの原則に基づく対策です。"}, {"type": "para", "text": "出口側の制限に当たるガードレールとして、AIエージェントの出力に、応募者の年齢、性別、出身大学などの属性に基づ く評価コメントが含まれていないかを自動で確認する仕組みを設計します。たとえば、「男性なので〜」「女性なの で〜」「○○大学出身なので〜」といった表現が出力に含まれていた場合には、不適切な出力として検知し、再生成を 求めるようにします。"}, {"type": "point", "text": ""}, {"type": "para", "text": "また、設計段階で定めたルールを一度入れて終わりにするのではなく、運用後も継続的に偏りを監 視する仕組みを組み込むことが重要です。たとえば、同じスキルや経験を持つ模擬応募書類につい て、属性情報だけを変えて入力し、評価結果の差が許容範囲内に収まっているかを定期的に確認し ます。こうした監視を継続することで、出力上のバイアスが生じていないかを把握しやすくなりま す。"}]}]}]}, {"s": 4, "title": "開発・検証", "exam_focus": "本Sectionでは、Designで作成した設計をもとに、実際に動作するプロトタイプを構築し、想定ど\nおりに機能するかを検証する段階を扱います。\nPOINT\n試験では、プロトタイピング、サンドボックス、Human-in-the-Loop、フィードバックループとい\nう4つの概念について、それぞれの意味と役割を区別できることが求められます。特に、限定された\n環境で動作や精度を確認する段階がDevelopmentであり、本番環境へ展開し、業務への定着を図る\n段階がDeploymentである、という違いは重要な論点です。", "page_start": 380, "blocks": [{"category": "知識", "subtopics": [{"heading": "プロトタイピング — 「設計通りに gggiKIhYSFiKJIIIIiiIIIIiiIIIIiiIIIIiiIIIIiiIIIIiiIIWEiKIgggiKIgggiKIgggiKIgggiKIgggiKIgggiKIgggiKIgggiKIgggiKIgggiKIgggiKIgggiKIgggiKIgggiKL/2Q=="], "elements": [{"type": "para", "text": "プロトタイピングとは、Designで作成した設計をもとに、必要最小限の機能だけを持つ試作品を作ることです。目的 は、完成品を作ることではなく、設計どおりに動くか、技術的に実現できそうかを早い段階で確認することにあります。"}, {"type": "para", "text": "ここで、似た言葉との違いを整理しておきます。"}, {"type": "para", "text": "プロトタイプ は、設計した仕組みが技術的に動くかを確認するための試作品です。主な利用者は、開発や設計に関わる メンバーであり、「この設計で本当に動くか」を確かめるために用います。"}, {"type": "para", "text": "PoC は、その仕組みが業務上または技術上、実現可能だと示すための検証です。主な対象は、導入判断を行う意思決定 者であり、「この方法で実際に効果が期待できるか」「導入に進む価値があるか」を判断する材料として用います。"}, {"type": "para", "text": "MVP は、実際の利用者に最小限の価値を提供できる状態まで作り込んだ製品です。主な利用者は実際の業務担当者や顧 客であり、「最低限使える形で提供し、実際の利用を通じて改善していく」ことを目的とします。"}, {"type": "para", "text": "このように整理すると、プロトタイプは「動くかを確かめる試作品」、PoCは「実現可能性を確かめる検証」、MVPは 「最小限でも価値を提供する実用品」という違いがあります。"}]}, {"heading": "サンドボックス — 本番環境から隔離された安全な検証空間", "page": 381, "_heading_y": 333.7712097167969, "figures": [], "elements": [{"type": "para", "text": "サンドボックスとは、本番環境から切り離された検証用の環境を指します。ここでは、テスト用のデータを用いて、プロ トタイプが設計どおりに動作するかを確認します。本番データや本番業務に影響を与えずに検証できる点が特徴です。"}, {"type": "para", "text": "サンドボックスとパイロットの違いは、検証の段階と対象にあります。サンドボックスは、開発・検証の段階で用いる環 境であり、テスト用データを使って、限られた関係者が隔離環境の中で動作確認を行います。"}, {"type": "para", "text": "一方、パイロットは、本番導入の直前または初期段階で行う限定運用であり、実際の利用者と実データを対象として、 本番に近い環境で運用上の課題を確認します。したがって、サンドボックスは「安全に試すための検証環境」であり、パ イロットは「実運用に近い条件で確かめるための限定導入」と整理できます。"}]}, {"heading": "Human-in-the-Loop", "page": 381, "_heading_y": 517.771240234375, "figures": [], "elements": [{"type": "para", "text": "HITL(Human-in-the-Loop)とは、AIエージェントの処理の途中に、人間による確認、判断、修正の工程を組み込む仕 組みです。Section21で扱った考え方を、Developmentの段階で実際の運用設計に当てはめたものといえます。"}, {"type": "para", "text": "開発段階では、AIエージェントの出力品質がまだ安定していないことが多いため、人間が内容を確認する工程が重要にな ります。また、その確認結果や修正内容は、AIエージェントの改善に活用できるフィードバックとして蓄積できます。"}, {"type": "para", "text": "Section2で学んだ自律性レベルとの関係で整理すると、支援型では、人間の確認が常に入るため、HITLが継続的に組み 込まれた状態になります。これに対して協働型では、通常はAIエージェントが処理を進めつつ、一定の条件に当てはまる 場合に限って人間が介入するため、HITLは条件付きで機能する形になります。"}]}, {"heading": "フィードバックループ", "page": 382, "_heading_y": 63.748023986816406, "figures": [], "elements": [{"type": "para", "text": "フィードバックループとは、「実行→結果の評価→改善→再実行」を繰り返す改善サイクルのことです。Step 2の Definitionで設定した合格基準が、「このサイクルをいつ終了してよいか」の判断基準として機能します。"}]}, {"heading": "Go / No-Go / Pivot判断", "page": 382, "_heading_y": 141.74803161621094, "figures": ["data:image/jpeg;base64,/9j/7gAOQWRvYmUAZAAAAAAB/9sAxQAMCAgICAgMCAgMEAsLCwwPDg0NDhQSDg4TExIXFBIUFBobFxQUGx4eJxsUJCcnJyckMjU1NTI7Ozs7Ozs7Ozs7AQ0KCgwKDA4MDA4RDg4MDREUFA8PERQQERgREBQUExQVFRQTFBUVFRUVFRUaGhoaGhoeHh4eHiMjIyMnJycsLCwCDQoKDAoMDgwMDhEODgwNERQUDw8RFBARGBEQFBQTFBUVFBMUFRUVFRUVFRoaGhoaGh4eHh4eIyMjIycnJywsLP/dAAQAG//AABEIAOABqgMAIgABEQECEQL/xAGiAAABBQEBAQADAAAAAAAAAAACAAMEBQcGAQgJCgsBAQACAwABBQAAAAAAAAAAAAECAwAEBQYHCAkKCxAAAgECAwEHBwkJCm8AAAAAAQIDBBEAEiEFBhMxNEFzshQiM1Fhk7EVIzJTVFVxkdIWFzVCUnSB0dMHJCVjZHKSlLPiCAkKGBkaJicoKSo2Nzg5OkNERUZHSElKVldYWVpiZWZnaGlqdXZ3eHl6goOEhYaHiImKlZaXmJmaoaKjpKWmp6ipqrS1tre4ubrBwsPExcbHyMnK1NXW19jZ2uHj5OXm5+jp6vDx8vP09fb3+Pn6EQABAgEFAwcMBH8AAAAAAAABABECAxIhQYExQlEEEyJhcZHBBTJSU4KhoqOx0eHwFCNikgYHCAkKFRYXGBkaJCUmJygpKjM0NTY3ODk6Q0RFRkdISUpUVVZXWFlaY2RlZmdoaWpyc3R1dnd4eXqDhIWGh4iJipOUlZaXmJmapKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uLj5OXm5+jp6vHy8/T19vf4+fr/2gAMAwAAARECEQA/ANUwxFXUcxiEMyOZ0d4srA51QgMR2wCRfBVVNHWU700pcI4AJjdon0IOjKQRwchxyWxNz8UW1aaDNPJ4lU8q1MwkqEhMzujJGmYgEZRdgNDpfFknBBFDEYoiDDUA4ZjW+FhaoxREEAB3y92pdgkkcmYRur5GKtlIOVhwg24DrwYGSpp4pFhlkVHkV2RWIDEJYsRfkF9cc/UStJtCrj3N0ckddUWhqq2VHhpIytxvlmsJHF9Mo15TbAbWoKzxS2JRU1W6TRUtYvVUiLOXypEDnB0OblxISIJAMU14SaboaElyA7B7lZFSDGWLB2IFGWWrZdHDPBUR77BIsiXYZkIZbqSCLjtEYag2ns+pkjip6hJHli32MKb5k4Mw7mKfadA6bOooa2KERQMWrJoDLT08UajriqRyK5LaAcIHDiLuS2XJT0sEsUJiSq2WgFSHkMiSXN1KO5GtwykKLWN8ZjUEyKOcaCwuNXW+U7M6ycZwDVbZdXhpqumSpWjaVRO8bSLGT1xRSAWt2rnFBs1q+o2kkEFXNU09LJnr6lgY4mmSIQ7xGDwgsM7gaA4h7U2RTbTranZ8aPXbQqJAKiunTLHRwHUIhsFzZT1oXUk3OMEiJ02KKia7gXHwuzAXcJoa6sMZZwK2u7RdXNV0lOwWeaOIkXAd1QkdvUjBxyRyoJImV0bgZSGU+gRjn9vU61IGx9m7PjqKwUwRaqpiBgp47EKc7KczaaKt9dTifue 87S3Swaz5QcnnedpbpYJo2azOu3BETjXZo3JWOo3ePH/DPbUbtSiW3M8txbzgBSlThBug6QAkJArTHCKvWbKDk+7ztLdLBrNlByfd52lulgmjZrM64e2Iicac0X1dwRSazZQcn3edpbpYNZsoOTzvO0t0sKpt2azMfuCJxxp8lvq7imyt88cb9kfrQ1Gus2UHJ97naW6WBOT04880q1rUenmWHUvJYLbLKFLQaoKriQSAcacWGwMY4OqjTNIMAHRMLFLQEiSQRNNIswvq7gggjJWiCCCBC//9TqkEEECEQQQQIRBBBAhEEEECEQQQQIRBBBAhEEEECEQQQQIRBBBAhEEEECEQQQQIRBBBAhEEEECEQQQQIRBBBAhEEEECEQQQQIRBBBAhEEEECEQQQQIRBBBAhEEEECEQQQQIRBBBAhEEEECEQQQQIRBBBAhf/Z"], "elements": [{"type": "para", "text": "Designでプロンプト設計書、I/O仕様書、セキュリティ設計書が完成しました。ここからDevelopmentに入り、実際に動 くプロトタイプを構築して検証します。"}, {"type": "subhead", "text": "判断1"}, {"type": "subhead", "text": "プロトタイプ構築"}, {"type": "para", "text": "全職種を同時にプロトタイプ化すると、対象業務や評価条件が多様になり、検証すべき変数が増えすぎます。そのため、 Discoveryで比較的短期間に成果を示しやすい対象として選定したエンジニア職に絞って検証します。"}, {"type": "para", "text": "ここでは、「エンジニア職の応募書類からスキルを抽出し、求人要件と照合してスコアリングする」という中核機能 が、設計どおりに動作するかを確認します。ワークフロー構築ツールを使えば、プロンプト設計書に基づいたプロトタイ プを短期間で構築できます。"}, {"type": "para", "text": "この段階では、画面の完成度や、発生頻度の低い特殊なケースまで最初から完全に対応することを目指すのではなく、 まず主要な利用場面で期待した出力が得られるかの確認に集中します。"}, {"type": "subhead", "text": "判断2"}, {"type": "subhead", "text": "サンドボックスでのPoC設計"}, {"type": "para", "text": "プロトタイプが完成したら、次にサンドボックス環境でPoCを実施します。検証には、エンジニア職の応募書類 50件 を用 います。"}, {"type": "para", "text": "内訳は、要件に明確に合致する書類 15件 、要件に明確に合致しない書類 15件 、判断が分かれやすいボーダーラインの書 類 10件 、さらに、異業種からの転職、フリーランス経験のみ、海外での職務経歴など、発生頻度は低いものの判断が難 しいケース 10件 です。"}, {"type": "para", "text": "これら 50件 をプロトタイプに入力し、Definitionで定めた合格基準と照合して評価します。その結果、処理時間は平均12 秒であり、合格基準である30秒以内を満たしました。また、バイアステストについても、許容範囲を±3点以内とした基 準に対し、実測値は±2点であり、基準を満たしました。"}, {"type": "para", "text": "一方で、スキル適合度スコアの精度は、合格基準90%に対して初回結果が78%、通過・不通過の判定一致率は、合格基 準85%に対して初回結果が72%にとどまりました。このことから、処理速度とバイアス面では基準を満たしているもの の、スコアリング精度と判定の安定性には改善が必要であると判断できます。"}, {"type": "para", "text": "したがって、次の段階では、この結果をもとにフィードバックループを回し、どこに精度低下の原因があるのかを分析し ながら、設計と実装を改善していきます。"}, {"type": "subhead", "text": "判断3"}, {"type": "subhead", "text": "フィードバックループ"}, {"type": "para", "text": "次に、ベテランの人事担当者 2名 にHuman-in-the-Loopとして参加してもらい、プロトタイプの出力内容を確認しながら フィードバックを収集します。初回の確認では、主に次の3点の問題が明らかになりました。"}, {"type": "para", "text": "1つ目は、フリーランス経験の評価が低すぎるという点です。人事担当者からは、「フリーランス経験も、内容によって は会社員としての経験と同等に評価すべきである」という指摘がありました。これに対して、Few-shotの例にフリーラ ンス経歴を適切に評価した事例を追加しました。"}, {"type": "para", "text": "2つ目は、類似する役割名称を別のスキルとして扱っているという点です。たとえば、「チームリーダー」と「テックリ ード」を別の役割として判定していましたが、実務上は近い役割として扱う方が適切であると判断されました。これに 対して、システムプロンプトに役割名称の同義語リストを追加しました。"}, {"type": "para", "text": "3つ目は、求人要件に明示されていないが関連性の高い技術的貢献が評価に反映されていないという点です。これに対し て、「求人要件に直接記載がない場合でも、関連する技術的貢献は加点対象とする」という判断ルールを追加しまし た。"}, {"type": "para", "text": "これらの修正を反映したうえで再度検証を行ったところ、スキル適合度スコアの精度は86%、通過・不通過の判定一致 率は80%まで改善しました。"}, {"type": "para", "text": "さらに、2回目のフィードバックを反映して3回目の検証を行った結果、スキル適合度スコアの精度は92%、判定一致率 は87%となり、いずれも合格基準を満たしました。"}, {"type": "subhead", "text": "判断4"}, {"type": "subhead", "text": "Go/No-Go/Pivot判断"}, {"type": "para", "text": "フィードバックループを3回実施した結果、最終的な評価は次のとおりとなりました。 ・スキル適合度スコアの精度は 92%であり、合格基準である90%を満たしています。 ・通過、不通過の判定一致率は87%であり、合格基準である85% を満たしています。 ・処理時間は平均12秒であり、合格基準である30秒以内を満たしています。"}, {"type": "para", "text": "‧また、バイアステストの結果も± 2点であり、合格基準である±3点以内を満たしています。"}, {"type": "point", "text": ""}, {"type": "para", "text": "このように、設定した合格基準をすべて満たしたため、このケースではGo判断、すなわち次のStep 5であるDeploymentへ進む判断となります。一方で、Developmentの結果が基準を満たさない場合 には、直ちに本番展開へ進むのではなく、状況に応じて判断を分ける必要があります。たとえば、 スキル適合度スコアの精度が80%台から改善せず、フィードバックを重ねても基準に届かない場合 には、現時点では導入を進めないNo-Go判断が適切です。この場合は、求人要件の記述方法そのも のを見直す、評価軸を再設計する、といった前提条件の見直しが必要になります。"}, {"type": "para", "text": "また、精度自体は基準を満たしていても、処理コストが想定を大きく上回る場合には、進め方を修正するPivot判断が適 切です。たとえば、対象をシニアエンジニア職に限定する、あるいはより軽量なモデルへ切り替えるといった形で、スコ ープや実装方式を見直すことが考えられます。"}, {"type": "point", "text": ""}, {"type": "para", "text": "このように、Developmentの最終判断は、単に「成功か失敗か」の二択ではありません。そのまま 次へ進むのか、いったん止めるのか、方向を修正して続けるのか を、合格基準に照らして判断する ことが重要です。"}]}]}]}, {"s": 5, "title": "展開・定着", "exam_focus": "本Sectionでは、5Dモデルの最終ステップとして、検証済みのAIエージェントを本番環境へ展開\nし、組織内に定着させる方法を学びます。試験では、パイロット導入からロールアウト、さらにス\nケーリングへと進む段階的な展開プロセス、AI-SECIモデルの考え方、KPIモニタリングを通じた継\n続的改善の進め方が問われます。", "page_start": 389, "blocks": [{"category": "知識", "subtopics": [{"heading": "パイロット導入とは何か", "page": 389, "_heading_y": 357.7480163574219, "figures": [], "elements": [{"type": "para", "text": "パイロット導入とは、AIエージェントを全社一斉に展開するのではなく、まず限定された部門・チーム・業務で本番稼働 させることです。"}, {"type": "para", "text": "Step4のサンドボックス検証との最大の違いは、実データと実ユーザーを対象に、本番環境で運用する点にあります。サ ンドボックスではテスト用データを用いるため、設計どおりに動作しているように見えても、本番環境では、実データ 特有のばらつきや、想定していなかった例外的なケースが表面化することがあります。"}, {"type": "point", "text": ""}, {"type": "para", "text": "パイロットが重要なのは、本格展開の前に、実環境で使ったときの問題を小さな範囲で把握し、修 正できるからです。その理由は、大きく3つあります。"}, {"type": "para", "text": "1つ目は、実環境でしか見つからない品質上の問題があるためです。テストデータでは問題なく動作していても、実デー タには表記の揺れ、例外的なケース、入力ミスなどが含まれるため、本番に近い環境で初めて精度上の課題が見つかる ことがあります。"}, {"type": "para", "text": "2つ目は、AIエージェント本体だけでなく、運用の仕組みも同時に検証する必要があるためです。たとえば、AIエージェ ントが判断できないケースを誰に引き継ぐのか、誤出力があった場合にどう対応するのか、といった運用手順は、実際 に回してみなければ機能するか分からない場合があります。パイロットは、技術面だけでなく運用面の妥当性を確認す るために必要です。"}, {"type": "para", "text": "3つ目は、小さな成功実績が、その後の展開を進める根拠になるためです。AIエージェント導入では、いきなり全社展開 を行うよりも、まず限定範囲で成果を示した方が、経営層や現場の理解を得やすくなります。パイロットで定量的な成果 や改善効果を示せれば、それが次の展開判断の材料になります。これは、Section25で学んだクイックウィンの考え方に もつながります。"}]}, {"heading": "ロールアウトによる利用者の段階的拡大", "page": 390, "_heading_y": 143.74803161621094, "figures": [], "elements": [{"type": "para", "text": "ロールアウトとは、パイロットの成功を受けて対象範囲を段階的に広げていくプロセスです。ロールアウトの核心は 「同じ機能を、より多くの人に届ける」ことであり、機能自体は変わりません。"}, {"type": "para", "text": "段階的に進める意味は、リスクを管理可能な範囲に収めることにあります。全社一斉に展開して問題が起きれば影響は 全社に及びますが、段階的に広げれば各段階で問題を検出・修正してから次に進めます。"}]}, {"heading": "スケーリングによる機能‧範囲の拡張", "page": 390, "_heading_y": 265.7480163574219, "figures": [], "elements": [{"type": "para", "text": "スケーリングとは、AIエージェントの処理能力や適用範囲を拡大することです。ロールアウトが「同じ機能を多くの人に 広げる」のに対し、スケーリングは対象業務の拡大や新しい機能の追加など、能力そのものの拡張を含みます。"}]}, {"heading": "AI-SECIモデルが描く人間とAIエージェントの知識循環", "page": 390, "_heading_y": 343.7480163574219, "figures": [], "elements": [{"type": "para", "text": "AI-SECIモデルは、Section12で学んだSECIモデルを、AIエージェントの文脈に拡張した概念です。従来のSECIモデルが 「人間同士」の知識変換を扱うのに対し、AI-SECIモデルは「人間とAIエージェント」の間で知識が循環する構造を捉え ます。"}, {"type": "para", "text": "共同化では、担当者がAIエージェントの出力を日々確認する中で、感覚的な判断を蓄積していきます。表出化では、蓄積 された暗黙知がAIエージェントへのフィードバックとして明文化されます。連結化では、フィードバックが既存のプロン プトやナレッジベースに統合されます。内面化では、改善されたAIエージェントの出力を通じて、担当者が新たな判断力 を身につけます。"}, {"type": "para", "text": "このサイクルが回り続けることで、AIエージェントの精度と人間の判断力が同時に向上し、組織全体の知的資産が厚みを 増していきます。"}]}, {"heading": "KPIモニタリング", "page": 390, "_heading_y": 563.748046875, "figures": ["data:image/jpeg;base64,/9j/7gAOQWRvYmUAZAAAAAAB/9sAxQAMCAgICAgMCAgMEAsLCwwPDg0NDhQSDg4TExIXFBIUFBobFxQUGx4eJxsUJCcnJyckMjU1NTI7Ozs7Ozs7Ozs7AQ0KCgwKDA4MDA4RDg4MDREUFA8PERQQERgREBQUExQVFRQTFBUVFRUVFRUaGhoaGhoeHh4eHiMjIyMnJycsLCwCDQoKDAoMDgwMDhEODgwNERQUDw8RFBARGBEQFBQTFBUVFBMUFRUVFRUVFRoaGhoaGh4eHh4eIyMjIycnJywsLP/dAAQAG//AABEIAOMBqQMAIgABEQECEQL/xAGiAAABBQEBAAMBAAAAAAAAAAAEAAECAwcFBggJCgsBAAMBAQABBQEAAAAAAAAAAAABAgMEBQYHCAkKCxAAAQIDAwIJBw0KbwEAAAAAAQIDAAQRBRIhMbIGExQiMjRRdIIVI0FhkpPSFjM1UlNUVYGRo7HR0yQ2QkVxcnOhosEHCAkKFxgZGiUmJygpKjc4OTpDREZHSElKVldYWVpiY2RlZmdoaWp1dnd4eXqDhIWGh4iJipSVlpeYmZqkpaanqKmqs7S1tre4ubrCw8TFxsfIycrU1dbX2Nna4eLj5OXm5+jp6vDx8vP09fb3+Pn6EQABAgEEBgYJBn8AAAAAAAABABECAyExQRIyUWFxkQQTobHB0QUjU2JygZKi0gYHM0Jj4QgJChQVFhcYGRoiJCUmJygpKjQ1Njc4OTpDREVGR0hJSlJUVVZXWFlaZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKk5SVlpeYmZqjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytPU1dbX2Nna4uPk5ebn6Onq8PHy8/T19vf4+fr/2gAMAwAAARECEQA/ANUgVVq2WhRQucl0qSSCC62CCMCDroKjwtnuWYzJzrc5Y78zMGcnzp6ZLTkkF1y7r7uNBGslJiUERLzETQtW93ApiisWonem8vcIcQ6hLjSgtChVKkkKSQeSCIlHm7IkrYf0OWQmz54WeW5NAdSphL5UaJpsim7ShgyWYtizS7O2vagnJZplalNIlkNKFKG9VBUo0AOEKKTAJAjhJBIsWispi3QrT4UCIlpjOKZmz3zEe1aVnvupZZmG1uLLoSlJBJLJuuAeGk0MVzdt2PIvannZ1iXdCQq464hCqHIaEjcjx8s5P2Y9ZM6iRefmJtu1XW5ZIoQqadQ62Fk4JASaqJyR3NEDi3kydmtNDipOOS5WppN4NtIWlT6isp2IAIxy1jQyEIjhDkwxWU4ImsYiCa5gA6QjJBNYabCBmrsSlpWfPpUqRmWphLZAWWlpWE1yVoTTJDys/KTum6lcC9IeWw5gRRxGyTiBWlcojlPaE5FdnOSAWrj843NTLq0hS3ShYWUEJuAC6LoAGAjmWdZtkWhb0rN2FJCXkrOLq3ZsIU0l50goS2i9QqCakqNKViRJyUQjIiiaF5zCGmEzlxbGYIsogwIE9/8ASheqbm5Z6YelGnAp6WuacgVqnTBeRXwoEJc5Ktv6mcdSl3Si9cUaHSwQkr8JUx5rUVqzGia2HrKndRuNJkRccbS9Lu1bOChgoUplB {"type": "point", "text": ""}, {"type": "para", "text": "特に3つ目の「入社後のパフォーマンス」は、採用スクリーニングAI固有の本質的な指標です。書類 選考の工数を削減しても、採用した人材の質が下がっていれば導入の意味がありません。この指標 は半年〜1年のスパンで追跡する必要があるため、短期のアウトカム指標と長期のアウトカム指標を 分けて設計しておくことが重要です。"}]}]}, {"category": "業務シナリオ", "subtopics": [{"heading": "業務シナリオ：採用スクリーニングAIでの段階展開と定着化", "page": 391, "_heading_y": 516.095947265625, "figures": ["data:image/jpeg;base64,/9j/7gAOQWRvYmUAZAAAAAAB/9sAxQAMCAgICAgMCAgMEAsLCwwPDg0NDhQSDg4TExIXFBIUFBobFxQUGx4eJxsUJCcnJyckMjU1NTI7Ozs7Ozs7Ozs7AQ0KCgwKDA4MDA4RDg4MDREUFA8PERQQERgREBQUExQVFRQTFBUVFRUVFRUaGhoaGhoeHh4eHiMjIyMnJycsLCwCDQoKDAoMDgwMDhEODgwNERQUDw8RFBARGBEQFBQTFBUVFBMUFRUVFRUVFRoaGhoaGh4eHh4eIyMjIycnJywsLP/dAAQAG//AABEIALkBqgMAIgABEQECEQL/xAGiAAACAgMBAAMBAAAAAAAAAAAABAYHAgMFAQgJCgsBAQADAAIBBQAAAAAAAAAAAAEAAgMEBQYHCAkKCxAAAQIDAgMLCAgTaQAAAAAAAQIDAAQFESEGEhMxMjRBUXN0k7Kz0wcVFyJSVGHRFCMkNTZTcYEICQoWGBkaJSYnM1WDkZSxwdLUKCkqNzg5OkJDREVGR0hJSlZXWFlaYmNkZWZnaGlqcnV2d3h5eoKEhYaHiImKkpWWl5iZmqGio6Slpqeoqaq0tba3uLm6wsPExcbHyMnK1dbX2Nna4eLj5OXm5+jp6vDx8vP09fb3+Pn6EQABAgIDBAYKAYUAAAAAAAABAAIDESFBcRIxgcEEE0JSYbEFFDJRU5GSodHwogYHCAkKFRYXGBkaIiMkJSYnKCkqMzQ1Njc4OTpDREVGR0hJSlRVVldYWVpiY2RlZmdoaWpyc3R1dnd4eXqCg4SFhoeIiYqTlJWWl5iZmqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4eLj5OXm5+jp6vHy8/T19vf4+fr/2gAMAwAAARECEQA/ALNnZ2Wp0q5OTiw2y0LVqOlpdvCElhTRKg8qXlH8o4lC14oBJKUBJURZbbcq7Vv1I2YRIeco8w3LtqdcWkJShGNj3kZmLf5DVuiJYMUmuyc691LlVshxh9ltSnHFIGICEJxkXgDMSdQ3XxvChQ3QnOcZOBoEwNsaVRznBwAFB0FKGcLMH33W2UTYC3TYkKStF+MEAcskXlRsGrfHRTOyq5tcgl1PUlttLimsxeIo2BXRFupFfUzB6qSszT5hLcw7k3EKJcQ62UKddGNZy9wxApasYWC2zNMSaYlKlMTc3JU5p6UZmHDl599wLxUqAxxLJtUoFWqbADfZFosCE0ya+iRpJFEjYDeqF9DXuIpFdQ0F3JmaYk20uzKsRCnG2gbCeWcUEIFwOaSBA9MsS62m3lhCphzJtA+dl2FWKO2STHCruD7FQmpJhEqt0lxozE2txeKhlgg4p5cWrVcBdqm2HpqlS0rLSy5VpwopryplqXa6sWtRS4kpBWr1kJzYzuIcm8LG6dOiQloVmvX1K03TNAkJfXq1yeZnJV9C3GnEqS26tpaswBaDiqTfZmER5LT0pNqdTLuBamXC04BmhSQCR0c8L44zVJnzQly7ktLuTU5NuzLjUz1YwyXnFOWkAHHKARcLLTpxjgdRmqaxMuqlVMurmnAhx5CG5hTdjZvCbQElYJAFwiGHDDXm6mWukBQZ6KA502iVBFJXfS OY2pfDQzBEujobIKSS2JUuzmNqXw0GJUuzmNqXw0MwRLo6GyCklpl5csla3F5R10grVZii4WAAWmwDtY3QQQEzUX//2Q=="], "elements": [{"type": "para", "text": "Step 4でエンジニア職の採用スクリーニングプロトタイプがPoC合格基準をすべてクリアし、Go判断が出ました。ここ からStep 5に入り、本番環境への展開と組織への定着を進めます。"}, {"type": "subhead", "text": "判断1"}, {"type": "subhead", "text": "パイロット運用の設計"}, {"type": "para", "text": "全職種・全担当者に一斉展開するのではなく、まずエンジニア職の採用を担当する人事担当者 2名 でパイロット導入しま す。期間は2週間とし、実際の応募書類をAIエージェントが処理する本番運用を行います。"}, {"type": "para", "text": "パイロットで確認すべき観点は、主に 3つあります。"}, {"type": "point", "text": ""}, {"type": "para", "text": "1つ目は、実データでも精度が維持されるかという点です。サンドボックスではスコア精度92%を達 成していても、実際の応募書類には、誤字脱字、記載形式のばらつき、異業種からの転職者に見ら れる特殊な経歴記述などが含まれます。そのため、本番に近いデータでも同程度の精度が維持でき るかを確認する必要があります。"}, {"type": "point", "text": ""}, {"type": "para", "text": "2つ目は、運用プロセスが実際に機能するかという点です。たとえば、AIエージェントが出したスコ アリング結果を人事担当者がどのように確認するのか、その結果をエンジニアリングマネージャー へどのように共有するのか、といった一連の運用フローが無理なく回るかを検証します。ここで は、AIエージェント単体の性能だけでなく、人間との役割分担や引継ぎの流れまで含めて確認する ことが重要です。"}, {"type": "para", "text": "3つ目は、定量的な成果が実際に得られるか という点です。たとえば、「 1件 あたりの処理時間が20分から3分に短縮さ れた」「担当者間の判定一致率が85%から92%に向上した」といった形で、導入効果を数値として把握します。この数 値は、単に成果を確認するためだけでなく、その後の展開判断や予算確保の根拠にもなります。"}, {"type": "para", "text": "このような観点で数週間のパイロットを行い、たとえば処理時間が85%短縮され、判定の一貫性にも改善が見られた場 合、その結果は初期導入の成功事例として位置づけることができます。"}, {"type": "para", "text": "このような小さな成功実績が、クイックウィンとして全社展開の説得材料になります。"}, {"type": "subhead", "text": "判断2"}, {"type": "subhead", "text": "ロールアウトとスケーリングの計画"}, {"type": "para", "text": "パイロットの成功を受けて、展開計画を策定します。第1段階はエンジニア職担当の人事担当者 2名 でのパイロットで、 これは完了済みです。"}, {"type": "para", "text": "第2段階では全エンジニア職採用の担当者 5名 に展開します。これは同じ機能の利用者数を拡大するロールアウトです。"}, {"type": "para", "text": "第3段階では営業職・バックオフィス職への対応を追加します。営業職は「コミュニケーション力」のような定性的スキ ルの評価基準を新たに設計する必要があり、これは能力の拡張を伴うスケーリングです。"}, {"type": "para", "text": "第4段階で面接日程の自動調整機能を追加します。カレンダー連携という新機能の追加なので、これもスケーリングで す。"}, {"type": "para", "text": "各段階の進行判断基準として「スコア精度 85% 以上を2週間維持」「バイアステスト合格」「担当者満足度 70% 以上」の 3条件をすべて満たした場合に次の段階へ進むルールを設定します。"}, {"type": "subhead", "text": "判断3"}, {"type": "subhead", "text": "AI-SECIモデルによる定着化"}, {"type": "point", "text": ""}, {"type": "para", "text": "採用スクリーニングAIが稼働し始めた後、最も重要なのは定着化と継続改善です。AI-SECIモデルが 機能する具体的な場面を見てみます。"}, {"type": "para", "text": "共同化の場面として、ベテラン人事担当者がAIエージェントのスコアリング結果を日々確認する中で、「フリーランスで 複数の短期プロジェクトを経験している候補者を、AIエージェントがスキル年数で過小評価する傾向がある」という暗黙 知を蓄積します。"}, {"type": "para", "text": "表出化の場面として、この暗黙知が「フリーランス経歴の場合、プロジェクト数×平均期間で実質経験年数を算出すべ き」というフィードバックとして明文化されます。"}, {"type": "para", "text": "連結化の場面として、このフィードバックがFew-shotの例に追加され、フリーランス経歴の評価パターンとして既存の プロンプトに統合されます。さらに、この知見がエンジニア職だけでなくデザイナー職のスクリーニングにも横展開され ます。"}, {"type": "para", "text": "内面化の場面として、改善されたAIエージェントのスコアリング結果を日々確認する新人人事担当者が、「フリーランス 経歴はこう評価すべきだ」という判断力を自然に習得していきます。"}, {"type": "para", "text": "KPIモニタリングでは、アウトカム指標を中心に成果を追跡します。具体的には、 1件 あたりの処理時間の短縮率、担当 者間の判定一致率の変化、バイアステストの定期的な合格確認、採用後のパフォーマンスの追跡です。特に「AIエージェ ントが高スコアを付けた候補者が実際に入社後に活躍しているか」は、採用スクリーニングAIの本質的な成果を測るア ウトカム指標です。"}]}, {"heading": "実践事例:小さく試して効果を確認し全社展開する", "page": 394, "_heading_y": 291.2591857910156, "figures": ["data:image/jpeg;base64,/9j/7gAOQWRvYmUAZAAAAAAB/9sAxQAMCAgICAgMCAgMEAsLCwwPDg0NDhQSDg4TExIXFBIUFBobFxQUGx4eJxsUJCcnJyckMjU1NTI7Ozs7Ozs7Ozs7AQ0KCgwKDA4MDA4RDg4MDREUFA8PERQQERgREBQUExQVFRQTFBUVFRUVFRUaGhoaGhoeHh4eHiMjIyMnJycsLCwCDQoKDAoMDgwMDhEODgwNERQUDw8RFBARGBEQFBQTFBUVFBMUFRUVFRUVFRoaGhoaGh4eHh4eIyMjIycnJywsLP/dAAQAG//AABEIANsBqgMAIgABEQECEQL/xAGiAAABBQEBAAMBAAAAAAAAAAADAAIEBQcBBggJCgsBAAMBAAAHAQAAAAAAAAAAAAABAgMEBQYHCAkKCxAAAgECAgQBDwwFBXEAAAAAAQIDBBEABRITITFBBhQVIjIzNFFTYXKRsrPSI1JUcXN0g5KTlNHTQoGhsdQHFiQ14ggJChcYGRolJicoKSo2Nzg5OkNERUZHSElKVVZXWFlaYmNkZWZnaGlqdXZ3eHl6goSFhoeIiYqVlpeYmZqio6Slpqeoqaq0tba3uLm6wcLDxMXGx8jJytXW19jZ2uHj5OXm5+jp6vDx8vP09fb3+Pn6EQABAQIGBgUHFXEAAAAAAAABAAIRITFBUWHwEkJxgZHCA1Kh0eEEIjKSscHSBQYHCAkKExQVFhcYGRojJCVicrLxJicoKSozNDU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKk5SVlpeYmZqio6SlpqeoqaqztLW2t7i5usPExcbHyMnK09TV1tfY2dri4+Tl5ufo6ery8/T19vf4+fr/2gAMAwAAARECEQA/ANUwCtrabL6ZqurbQiVkUtYttdljXYATzTDB8eQ4qhXTtmM0gkjoqaPLoIla4jlleqilkkA3HRGit+nfAhevxHpMwo60MaaQPoTSw <script>
(function(){
'use strict';

const data = JSON.parse(document.getElementById('content').textContent);

const LS = {
  get: (k, def) => { try { const v = localStorage.getItem('reader_' + k); return v !== null ? JSON.parse(v) : def; } catch(e){ return def; } },
  set: (k, v)   => { try { localStorage.setItem('reader_' + k, JSON.stringify(v)); } catch(e){} }
};

let darkMode    = LS.get('dark', false);
let fontSize    = LS.get('fontSize', 15);
let activeFilter = 'all';
let bmViewMode  = false;
let searchMode  = false;

function stKey(secS, idx) { return `ch${data.ch}_s${secS}_st${idx}`; }
function getStatus(k) { return LS.get('status_' + k, ''); }
function setStatus(k, v) { LS.set('status_' + k, v); }
function getBm(k)   { return LS.get('bm_' + k, false); }
function setBm(k,v) { LS.set('bm_' + k, v); }
function getMemo(k) { return LS.get('memo_' + k, ''); }
function setMemo(k,v) { LS.set('memo_' + k, v); }

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function applyDark() {
  document.body.classList.toggle('dark', darkMode);
  document.getElementById('dark-btn').textContent = darkMode ? '☀️' : '🌙';
}
function applyFontSize() {
  document.documentElement.style.setProperty('--font-size', fontSize + 'px');
}

// ─── 要素レンダリング ───
function renderElements(elements) {
  if (!elements || !elements.length) return '';
  let html = '';
  for (const el of elements) {
    if (!el) continue;
    switch (el.type) {
      case 'para':
        if (!el.text || !el.text.trim()) continue;
        html += `<p class="body-para">${esc(el.text)}</p>`;
        break;
      case 'point': {
        const content = el.text ? esc(el.text) : '';
        html += `<div class="point-box"><span class="point-label">📌 POINT</span><div class="point-body">${content}</div></div>`;
        break;
      }
      case 'sub': {
        const titleHtml = esc(el.title || '');
        const bodyHtml  = el.text ? `<div class="sub-block-body">${esc(el.text)}</div>` : '';
        html += `<div class="sub-block"><div class="sub-block-title">${titleHtml}</div>${bodyHtml}</div>`;
        break;
      }
      case 'subhead':
        html += `<div class="subhead">${esc(el.text || '')}</div>`;
        break;
      case 'concept':
        html += `<div class="concept-name">${esc(el.title || '')}</div>`;
        break;
      case 'table': {
        const headers = (el.headers || []).map(h => `<th>${esc(h)}</th>`).join('');
        const rows = (el.rows || []).map(row =>
          `<tr>${row.map(c => `<td>${esc(c)}</td>`).join('')}</tr>`
        ).join('');
        html += `<div class="inline-table-wrap"><table class="inline-table"><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table></div>`;
        break;
      }
      case 'quiz': {
        const qid = 'q' + Math.random().toString(36).slice(2,8);
        const choicesHtml = (el.choices || []).map(c =>
          `<div class="quiz-choice"><span class="quiz-choice-label">${esc(c.label)}</span><span>${esc(c.text)}</span></div>`
        ).join('');
        const answerHtml = el.answer
          ? `<div class="quiz-answer-label">正解: ${esc(el.answer)}</div><div class="quiz-explanation">${esc(el.explanation)}</div>`
          : '';
        html += `<div class="quiz-card">
          <div class="quiz-question">${esc(el.question)}</div>
          <div class="quiz-choices">${choicesHtml}</div>
          <div class="quiz-answer-wrap">
            <button class="quiz-reveal-btn" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'▲ 正解を隠す':'▼ 正解を見る'">▼ 正解を見る</button>
            <div class="quiz-answer" id="${qid}">${answerHtml}</div>
          </div>
        </div>`;
        break;
      }
    }
  }
  return html;
}

// ─── 全体レンダリング ───
function renderAll() {
  const main    = document.getElementById('main');
  const tocRoot = document.getElementById('toc-root');
  main.innerHTML = '';
  tocRoot.innerHTML = '';

  // ─── チャプター横断ナビ ───
  const CH_LIST = [
    {n:1, title:'生成AIとAIエージェントの基礎'},
    {n:2, title:'業務の基礎'},
    {n:3, title:'AIデータリテラシーとマネジメント'},
    {n:4, title:'自動化レベルとワークフロー設計'},
    {n:5, title:'人と組織から考えるAI時代の組織設計'},
    {n:6, title:'AIエージェントを実装するDモデル'}
  ];
  const chNav = document.createElement('div');
  chNav.style.cssText = 'border-bottom:2px solid var(--border);padding-bottom:4px;margin-bottom:4px;';
  CH_LIST.forEach(c => {
    const a = document.createElement('a');
    a.href = `./ch${c.n}.html`;
    const isCurrent = (c.n === data.ch);
    a.style.cssText = 'display:flex;align-items:center;gap:8px;padding:9px 14px;text-decoration:none;border-bottom:1px solid var(--border);font-size:13px;';
    if (isCurrent) {
      a.style.cssText += 'background:var(--accent-light);color:var(--accent);font-weight:700;';
    } else {
      a.style.cssText += 'color:var(--text2);';
    }
    a.innerHTML = `<span style="min-width:32px;font-size:11px;font-weight:700;color:var(--accent);">Ch${c.n}</span><span>${esc(c.title)}</span>`;
    chNav.appendChild(a);
  });
  tocRoot.appendChild(chNav);

  data.sections.forEach(sec => {
    const tocSec    = document.createElement('div');
    tocSec.className = 'toc-sec';
    const tocSecBtn = document.createElement('button');
    tocSecBtn.className = 'toc-sec-btn';
    tocSecBtn.innerHTML = `<span>S${sec.s}｜${esc(sec.title)}</span><span>›</span>`;
    const tocStList = document.createElement('div');
    tocStList.className = 'toc-st-list';
    tocSecBtn.onclick = () => tocStList.classList.toggle('open');
    tocSec.appendChild(tocSecBtn);
    tocSec.appendChild(tocStList);
    tocRoot.appendChild(tocSec);

    const secBlock = document.createElement('div');
    secBlock.className = 'section-block';
    secBlock.id = `sec-${sec.s}`;

    let headerHTML = `
      <div class="section-header">
        <h2>Section ${sec.s}｜${esc(sec.title)}</h2>
        <div class="sec-meta">p.${sec.page_start}</div>
      </div>`;

    if (sec.exam_focus) {
      const efText = esc(sec.exam_focus).replace(/\n/g, '<br>');
      headerHTML += `<div class="exam-focus-card">
        <span class="ef-label">🎯 学習のポイント</span>
        <p>${efText}</p>
      </div>`;
    }

    secBlock.innerHTML = headerHTML;
    main.appendChild(secBlock);

    let stGlobalIdx = 0;
    sec.blocks.forEach(block => {
      const blockDiv = document.createElement('div');
      blockDiv.className = 'block-group';
      blockDiv.innerHTML = `<div class="block-header cat-${esc(block.category)}">${esc(block.category)}</div>`;
      secBlock.appendChild(blockDiv);

      block.subtopics.forEach((st, i) => {
        const key  = stKey(sec.s, stGlobalIdx);
        stGlobalIdx++;
        const card = renderSubtopic(st, key, sec.s, block.category);
        blockDiv.appendChild(card);

        const tocBtn = document.createElement('button');
        tocBtn.className = 'toc-st-btn';
        tocBtn.textContent = st.heading;
        tocBtn.onclick = () => {
          closeDrawer();
          card.scrollIntoView({ behavior: 'smooth', block: 'start' });
          openSubtopic(card);
        };
        tocStList.appendChild(tocBtn);
      });
    });
  });
}

function renderSubtopic(st, key, secS, cat) {
  const status = getStatus(key);
  const bm     = getBm(key);
  const memo   = getMemo(key);

  const card = document.createElement('div');
  const sc = status === 'known' ? ' status-known' : status === 'unsure' ? ' status-unsure' : status === 'unknown' ? ' status-unknown' : '';
  card.className = 'subtopic-card' + sc;
  card.id = 'st-' + key;
  card.dataset.key    = key;
  card.dataset.status = status;
  card.dataset.cat    = cat;

  let figHTML = '';
  if (st.figures && st.figures.length) {
    figHTML = '<div class="st-figures">';
    st.figures.forEach(uri => {
      figHTML += `<figure><img src="${uri}" alt="図解" loading="lazy" onclick="openImgModal(this.src)"></figure>`;
    });
    figHTML += '</div>';
  }

  const elemHTML = renderElements(st.elements);

  function sbClass(s) { return `status-btn${status === s ? ' active-' + s : ''}`; }

  card.innerHTML = `
    <div class="st-header" onclick="toggleSubtopic(this.parentElement)">
      <div class="st-heading">${esc(st.heading)}</div>
      <span class="st-page">p.${st.page}</span>
      <span class="st-toggle">▼</span>
    </div>
    <div class="st-body">
      ${elemHTML}
      ${figHTML}
    </div>
    <div class="st-actions">
      <button class="${sbClass('known')}"   data-status="known"   onclick="setStatusBtn(event,'${key}')">✓ 既知</button>
      <button class="${sbClass('unsure')}"  data-status="unsure"  onclick="setStatusBtn(event,'${key}')">△ 要確認</button>
      <button class="${sbClass('unknown')}" data-status="unknown" onclick="setStatusBtn(event,'${key}')">✗ 未理解</button>
      <button class="bm-btn-st${bm ? ' active' : ''}" onclick="toggleBm(event,'${key}')">★</button>
    </div>
    <textarea class="st-memo${memo ? ' open' : ''}" placeholder="メモ…"
      onchange="setMemo('${key}',this.value)">${esc(memo)}</textarea>
  `;
  return card;
}

function openSubtopic(card) {
  card.querySelector('.st-body').classList.add('open');
  card.querySelector('.st-toggle').textContent = '▲';
}

window.toggleSubtopic = function(card) {
  const body   = card.querySelector('.st-body');
  const toggle = card.querySelector('.st-toggle');
  body.classList.toggle('open');
  toggle.textContent = body.classList.contains('open') ? '▲' : '▼';
  if (body.classList.contains('open') && getBm(card.dataset.key)) {
    card.querySelector('.st-memo').classList.add('open');
  }
};

window.setStatusBtn = function(e, key) {
  e.stopPropagation();
  const btn   = e.currentTarget;
  const newSt = getStatus(key) === btn.dataset.status ? '' : btn.dataset.status;
  setStatus(key, newSt);
  const card = document.getElementById('st-' + key);
  card.dataset.status = newSt;
  card.className = 'subtopic-card' + (newSt === 'known' ? ' status-known' : newSt === 'unsure' ? ' status-unsure' : newSt === 'unknown' ? ' status-unknown' : '');
  card.querySelectorAll('.status-btn').forEach(b => {
    const s = b.dataset.status;
    b.className = `status-btn${newSt === s ? ' active-' + s : ''}`;
  });
  applyFilter();
};

window.toggleBm = function(e, key) {
  e.stopPropagation();
  const newBm = !getBm(key);
  setBm(key, newBm);
  e.currentTarget.classList.toggle('active', newBm);
  const card = document.getElementById('st-' + key);
  card.querySelector('.st-memo').classList.toggle('open', newBm);
};

function applyFilter() {
  document.querySelectorAll('.subtopic-card').forEach(card => {
    const st = card.dataset.status || '';
    let hide = false;
    if      (activeFilter === 'unknown') hide = st !== 'unknown';
    else if (activeFilter === 'unsure')  hide = st !== 'unsure';
    else if (activeFilter === 'known')   hide = st === 'known';
    card.classList.toggle('hidden', hide);
  });
}
document.getElementById('filter-chips').addEventListener('click', e => {
  const btn = e.target.closest('[data-filter]');
  if (!btn) return;
  activeFilter = btn.dataset.filter;
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.toggle('active', b === btn));
  applyFilter();
});

document.getElementById('search-btn').onclick = () => {
  searchMode = !searchMode;
  document.getElementById('search-bar').style.display = searchMode ? 'block' : 'none';
  if (searchMode) document.getElementById('search-input').focus();
  else {
    document.getElementById('search-input').value = '';
    document.querySelectorAll('.subtopic-card').forEach(c => c.classList.remove('hidden'));
    applyFilter();
  }
  bmViewMode = false;
  document.getElementById('bm-view').style.display = 'none';
  document.getElementById('main').style.display = 'block';
};
document.getElementById('search-input').oninput = function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { applyFilter(); return; }
  document.querySelectorAll('.subtopic-card').forEach(card => {
    const text = card.querySelector('.st-heading').textContent.toLowerCase()
               + ' ' + card.querySelector('.st-body').textContent.toLowerCase();
    card.classList.toggle('hidden', !text.includes(q));
  });
};

document.getElementById('bm-btn').onclick = () => {
  bmViewMode = !bmViewMode;
  document.getElementById('bm-view').style.display    = bmViewMode ? 'block' : 'none';
  document.getElementById('main').style.display       = bmViewMode ? 'none' : 'block';
  if (bmViewMode) renderBmList();
};
function renderBmList() {
  const list = document.getElementById('bm-list');
  list.innerHTML = '';
  let found = 0;
  data.sections.forEach(sec => {
    let idx = 0;
    sec.blocks.forEach(block => {
      block.subtopics.forEach(st => {
        const key = stKey(sec.s, idx++);
        if (getBm(key)) {
          found++;
          const m = getMemo(key);
          const item = document.createElement('div');
          item.className = 'bm-item';
          item.innerHTML = `
            <div class="bm-item-heading">${esc(st.heading)}</div>
            <div class="bm-item-meta">S${sec.s}｜${esc(sec.title)} / p.${st.page}</div>
            ${m ? `<div class="bm-item-memo">${esc(m)}</div>` : ''}`;
          item.onclick = () => {
            bmViewMode = false;
            document.getElementById('bm-view').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            const card = document.getElementById('st-' + key);
            if (card) { card.scrollIntoView({ behavior: 'smooth' }); openSubtopic(card); }
          };
          list.appendChild(item);
        }
      });
    });
  });
  if (!found) list.innerHTML = '<div class="bm-empty">ブックマークがまだありません</div>';
}

window.openImgModal = function(src) {
  document.getElementById('img-modal-img').src = src;
  document.getElementById('img-modal').classList.add('open');
};
document.getElementById('img-modal').onclick = function(e) {
  if (e.target === this || e.target.id === 'img-modal-close')
    this.classList.remove('open');
};

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
document.getElementById('menu-btn').onclick = () => {
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
};
document.getElementById('overlay').onclick = closeDrawer;

const slider = document.getElementById('font-slider');
slider.value = fontSize;
slider.oninput = () => { fontSize = +slider.value; applyFontSize(); LS.set('fontSize', fontSize); };

document.getElementById('dark-btn').onclick = () => {
  darkMode = !darkMode; applyDark(); LS.set('dark', darkMode);
};

const bc = document.getElementById('breadcrumb');
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const sec = data.sections.find(s => `sec-${s.s}` === e.target.id);
      if (sec) bc.textContent = `第${data.ch}章 > S${sec.s} ${sec.title}`;
    }
  });
}, { rootMargin: '-50px 0px -70% 0px' });

applyDark();
applyFontSize();
renderAll();
applyFilter();
document.querySelectorAll('.section-block').forEach(el => observer.observe(el));

})();
</script>
</body>
</html>
